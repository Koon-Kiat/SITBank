# SITBank OpenSSH hardening drop-in.
# Install as /etc/ssh/sshd_config.d/99-sitbank-hardening.conf only after
# confirming the listed users exist and the current operator has a fresh
# tested login path.
PermitRootLogin no
PasswordAuthentication no
KbdInteractiveAuthentication no
PubkeyAuthentication yes
AuthenticationMethods publickey
AllowUsers student12 sitbank-deploy
MaxAuthTries 4
