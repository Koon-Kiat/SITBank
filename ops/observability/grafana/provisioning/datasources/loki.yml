apiVersion: 1

datasources:
  - name: SITBank Loki
    uid: sitbank-loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: false
    jsonData:
      maxLines: 1000
  - name: SITBank Prometheus
    uid: sitbank-prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    editable: false
    jsonData:
      timeInterval: 30s
