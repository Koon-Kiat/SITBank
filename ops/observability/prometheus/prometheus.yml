global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    environment: "${OBSERVABILITY_ENVIRONMENT}"
    service: sitbank-observability

scrape_configs:
  - job_name: sitbank-node
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          environment: "${OBSERVABILITY_ENVIRONMENT}"
          service: ec2-node
          host_role: edge
