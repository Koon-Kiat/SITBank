name: sitbank-observability

services:
  grafana:
    image: ${GRAFANA_IMAGE:?GRAFANA_IMAGE must be an immutable digest reference}
    container_name: sitbank-grafana
    user: "472:472"
    read_only: true
    init: true
    restart: unless-stopped
    ports:
      - 127.0.0.1:3000:3000
    environment:
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_PATHS_DATA: /var/lib/grafana
      GF_SERVER_ROOT_URL: ${GRAFANA_PRIVATE_ROOT_URL:?GRAFANA_PRIVATE_ROOT_URL must be the private Tailscale URL}
      GF_SERVER_SERVE_FROM_SUB_PATH: ${GRAFANA_SERVE_FROM_SUB_PATH:-false}
      GF_SECURITY_ADMIN_USER__FILE: /run/secrets/grafana_admin_user
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_LOG_MODE: console
    secrets:
      - grafana_admin_user
      - grafana_admin_password
    volumes:
      - type: bind
        source: /etc/sitbank-observability/grafana/provisioning
        target: /etc/grafana/provisioning
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: /etc/sitbank-observability/grafana/dashboards
        target: /var/lib/grafana/dashboards
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: /var/lib/sitbank-observability/grafana
        target: /var/lib/grafana
        read_only: false
        bind:
          create_host_path: false
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m,uid=472,gid=472,mode=1770
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 512m
    networks:
      - host-loopback
      - observability
    depends_on:
      - loki
      - prometheus

  prometheus:
    image: ${PROMETHEUS_IMAGE:?PROMETHEUS_IMAGE must be an immutable digest reference}
    container_name: sitbank-prometheus
    user: "65534:65534"
    read_only: true
    init: true
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=168h
      - --web.listen-address=0.0.0.0:9090
    volumes:
      - type: bind
        source: /etc/sitbank-observability/prometheus/prometheus.yml
        target: /etc/prometheus/prometheus.yml
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: /var/lib/sitbank-observability/prometheus
        target: /prometheus
        read_only: false
        bind:
          create_host_path: false
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m,uid=65534,gid=65534,mode=1770
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 512m
    networks:
      - observability
    depends_on:
      - node-exporter

  node-exporter:
    image: ${NODE_EXPORTER_IMAGE:?NODE_EXPORTER_IMAGE must be an immutable digest reference}
    container_name: sitbank-node-exporter
    user: "65534:65534"
    pid: host
    read_only: true
    init: true
    restart: unless-stopped
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host/root
      - --web.listen-address=:9100
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|run/credentials/.+|sys|var/lib/docker/.+)($|/)
      - --collector.netdev.device-exclude=^(veth.*|docker.*|br-.*|lo)$
    volumes:
      - type: bind
        source: /proc
        target: /host/proc
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: /sys
        target: /host/sys
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: /
        target: /host/root
        read_only: true
        bind:
          create_host_path: false
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m,uid=65534,gid=65534,mode=1770
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 128m
    networks:
      - observability

  loki:
    image: ${LOKI_IMAGE:?LOKI_IMAGE must be an immutable digest reference}
    container_name: sitbank-loki
    user: "10001:10001"
    read_only: true
    init: true
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/loki.yml
    ports:
      - 127.0.0.1:3100:3100
    volumes:
      - type: bind
        source: /etc/sitbank-observability/loki/loki.yml
        target: /etc/loki/loki.yml
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: /var/lib/sitbank-observability/loki
        target: /var/lib/loki
        read_only: false
        bind:
          create_host_path: false
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m,uid=10001,gid=10001,mode=1770
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 768m
    networks:
      - host-loopback
      - observability

  alloy:
    image: ${ALLOY_IMAGE:?ALLOY_IMAGE must be an immutable digest reference}
    container_name: sitbank-alloy
    user: "0:0"
    group_add:
      - "${ALLOY_NGINX_LOG_GROUP_ID:?ALLOY_NGINX_LOG_GROUP_ID must be rendered by bootstrap from the host adm group}"
      - "${ALLOY_JOURNAL_GROUP_ID:?ALLOY_JOURNAL_GROUP_ID must be rendered by bootstrap from the host systemd-journal group}"
    read_only: true
    init: true
    restart: unless-stopped
    command:
      - run
      - --server.http.listen-addr=127.0.0.1:12345
      - --storage.path=/var/lib/alloy
      - /etc/alloy/config.alloy
    volumes:
      - type: bind
        source: /etc/sitbank-observability/alloy/config.alloy
        target: /etc/alloy/config.alloy
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: /var/log/nginx
        target: /var/log/nginx
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: /var/log/journal
        target: /var/log/journal
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: /var/lib/sitbank-observability/alloy
        target: /var/lib/alloy
        read_only: false
        bind:
          create_host_path: false
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m,mode=1770
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 512m
    networks:
      - observability
    depends_on:
      - loki

secrets:
  grafana_admin_user:
    file: /etc/sitbank-observability/secrets/grafana_admin_user
  grafana_admin_password:
    file: /etc/sitbank-observability/secrets/grafana_admin_password

networks:
  host-loopback:
    name: sitbank-observability-loopback
    driver: bridge
    internal: false
  observability:
    name: sitbank-observability
    driver: bridge
    internal: true
