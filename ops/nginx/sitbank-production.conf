server {
    listen 80;
    listen [::]:80;
    server_name sitbank.pp.ua www.sitbank.pp.ua 18.188.152.24;

    server_tokens off;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location ~ /\.(?!well-known/acme-challenge/) {
        return 404;
    }

    location ~* \.(?:bak|old|orig|save|swp|tmp)$ {
        return 404;
    }

    location / {
        return 301 https://sitbank.pp.ua$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.sitbank.pp.ua;

    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/sitbank.pp.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sitbank.pp.ua/privkey.pem;
    include /etc/nginx/snippets/sitbank-tls-policy.conf;
    ssl_session_cache shared:sitbank_prod_ssl:10m;
    ssl_session_timeout 1d;
    ssl_client_certificate /etc/nginx/sitbank-production-cloudflare-origin-pull-ca.pem;
    ssl_verify_client on;

    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

    return 301 https://sitbank.pp.ua$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sitbank.pp.ua;

    server_tokens off;
    access_log /var/log/nginx/sitbank.access.log;
    error_log /var/log/nginx/sitbank.error.log warn;

    ssl_certificate /etc/letsencrypt/live/sitbank.pp.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sitbank.pp.ua/privkey.pem;
    include /etc/nginx/snippets/sitbank-tls-policy.conf;
    ssl_session_cache shared:sitbank_prod_ssl:10m;
    ssl_session_timeout 1d;
    ssl_client_certificate /etc/nginx/sitbank-production-cloudflare-origin-pull-ca.pem;
    # Require Cloudflare's authenticated client certificate before proxying.
    ssl_verify_client on;

    proxy_hide_header X-Content-Type-Options;
    proxy_hide_header X-Frame-Options;
    proxy_hide_header Referrer-Policy;
    proxy_hide_header Permissions-Policy;
    proxy_hide_header Strict-Transport-Security;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

    limit_req_status 429;
    limit_req_log_level warn;

    client_max_body_size 4m;
    client_body_timeout 15s;
    client_header_timeout 15s;
    keepalive_timeout 30s;
    send_timeout 30s;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    if ($request_method = TRACE) {
        return 405;
    }

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location = /health/ready {
        allow 127.0.0.1;
        allow ::1;
        deny all;

        proxy_pass http://127.0.0.1:5000;
        include /etc/nginx/snippets/sitbank-proxy-headers.conf;
    }

    location = /health/live {
        limit_req zone=sitbank_prod_app burst=60 nodelay;
        proxy_pass http://127.0.0.1:5000;
        include /etc/nginx/snippets/sitbank-proxy-headers.conf;
    }

    location ^~ /admin {
        return 404;
    }

    location ~ /\.(?!well-known/acme-challenge/) {
        return 404;
    }

    location ~* \.(?:bak|old|orig|save|swp|tmp)$ {
        return 404;
    }

    location = /register {
        limit_req zone=sitbank_prod_register burst=3 nodelay;
        proxy_pass http://127.0.0.1:5000;
        include /etc/nginx/snippets/sitbank-proxy-headers.conf;
    }

    location = /auth/register {
        limit_req zone=sitbank_prod_register burst=3 nodelay;
        proxy_pass http://127.0.0.1:5000;
        include /etc/nginx/snippets/sitbank-proxy-headers.conf;
    }

    location = /login {
        limit_req zone=sitbank_prod_auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:5000;
        include /etc/nginx/snippets/sitbank-proxy-headers.conf;
    }

    location = /auth/login {
        limit_req zone=sitbank_prod_auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:5000;
        include /etc/nginx/snippets/sitbank-proxy-headers.conf;
    }

    location = /mfa/verify {
        limit_req zone=sitbank_prod_auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:5000;
        include /etc/nginx/snippets/sitbank-proxy-headers.conf;
    }

    location = /auth/mfa/verify {
        limit_req zone=sitbank_prod_auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:5000;
        include /etc/nginx/snippets/sitbank-proxy-headers.conf;
    }

    location ~ ^/auth/webauthn/(?:register|authenticate|step-up)/(?:options|verify)$ {
        limit_req zone=sitbank_prod_challenge burst=3 nodelay;
        proxy_pass http://127.0.0.1:5000;
        include /etc/nginx/snippets/sitbank-proxy-headers.conf;
    }

    location ~ ^/(?:account|password|profile|security-keys|sessions)(?:/|$) {
        limit_req zone=sitbank_prod_security burst=10 nodelay;
        proxy_pass http://127.0.0.1:5000;
        include /etc/nginx/snippets/sitbank-proxy-headers.conf;
    }

    location ~ ^/auth/(?:account|mfa|password|sessions|webauthn/credentials)(?:/|$) {
        limit_req zone=sitbank_prod_security burst=10 nodelay;
        proxy_pass http://127.0.0.1:5000;
        include /etc/nginx/snippets/sitbank-proxy-headers.conf;
    }

    location /auth/ {
        limit_req zone=sitbank_prod_auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:5000;
        include /etc/nginx/snippets/sitbank-proxy-headers.conf;
    }

    location / {
        limit_req zone=sitbank_prod_app burst=60 nodelay;
        proxy_pass http://127.0.0.1:5000;
        include /etc/nginx/snippets/sitbank-proxy-headers.conf;
    }
}
