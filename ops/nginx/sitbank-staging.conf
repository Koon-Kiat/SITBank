server {
    listen __SITBANK_PUBLIC_BIND_ADDRESS__:80;
    server_name staging-sitbank.pp.ua;

    server_tokens off;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location ~ /\.(?!well-known/acme-challenge/) {
        return 404;
    }

    location ~* \.(?:bak|old|orig|save|swp|tmp)$ {
        return 404;
    }

    location / {
        return 403;
    }
}

server {
    listen 127.0.0.1:8081;
    listen [::1]:8081;
    server_name localhost;

    server_tokens off;
    access_log off;

    location = /health/ready {
        allow 127.0.0.1;
        allow ::1;
        deny all;

        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host staging-sitbank.pp.ua;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        return 404;
    }
}

server {
    listen __SITBANK_PUBLIC_BIND_ADDRESS__:443 ssl http2;
    server_name staging-sitbank.pp.ua;

    server_tokens off;
    access_log /var/log/nginx/sitbank-staging.access.log;
    error_log /var/log/nginx/sitbank-staging.error.log warn;

    ssl_certificate /etc/letsencrypt/live/staging-sitbank.pp.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging-sitbank.pp.ua/privkey.pem;
    include /etc/nginx/snippets/sitbank-tls-policy.conf;
    ssl_client_certificate /etc/nginx/cloudflare-authenticated-origin-pull-ca.pem;
    # Enforce Authenticated Origin Pull once for every public TLS location.
    ssl_verify_client on;
    ssl_session_cache shared:sitbank_staging_ssl:10m;
    ssl_session_timeout 1d;

    proxy_hide_header X-Content-Type-Options;
    proxy_hide_header X-Frame-Options;
    proxy_hide_header Referrer-Policy;
    proxy_hide_header Permissions-Policy;
    proxy_hide_header Strict-Transport-Security;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    limit_req_status 429;
    limit_req_log_level warn;
    error_page 429 = @sitbank_rate_limited;

    client_max_body_size 4m;
    client_body_timeout 15s;
    client_header_timeout 15s;
    keepalive_timeout 30s;
    send_timeout 30s;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location @sitbank_rate_limited {
        internal;
        default_type "text/html; charset=utf-8";
        return 429 '<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>429 | SITBank</title></head><body><main><h1>Too many attempts</h1><p>Too many attempts. Please try again later.</p><p><a href="/login">Return to login</a></p></main></body></html>';
    }

    location @sitbank_rate_limited_json {
        internal;
        default_type application/json;
        return 429 '{"error":"Too many attempts. Please try again later."}';
    }

    location = /health/ready {
        return 404;
    }

    location = /health/live {
        limit_req zone=sitbank_staging_app burst=40 nodelay;
        proxy_pass http://127.0.0.1:5001;
        include /etc/nginx/snippets/sitbank-proxy-headers.conf;
        include /etc/nginx/snippets/sitbank-cloudflare-access-headers.conf;
    }

    location ~ /\.(?!well-known/acme-challenge/) {
        return 404;
    }

    location ~* \.(?:bak|old|orig|save|swp|tmp)$ {
        return 404;
    }

    location = /login {
        limit_req zone=sitbank_staging_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:5001;
        include /etc/nginx/snippets/sitbank-proxy-headers.conf;
        include /etc/nginx/snippets/sitbank-cloudflare-access-headers.conf;
    }

    location = /register {
        limit_req zone=sitbank_staging_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:5001;
        include /etc/nginx/snippets/sitbank-proxy-headers.conf;
        include /etc/nginx/snippets/sitbank-cloudflare-access-headers.conf;
    }

    location = /mfa/verify {
        limit_req zone=sitbank_staging_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:5001;
        include /etc/nginx/snippets/sitbank-proxy-headers.conf;
        include /etc/nginx/snippets/sitbank-cloudflare-access-headers.conf;
    }

    location ^~ /auth/ {
        error_page 429 = @sitbank_rate_limited_json;
        limit_req zone=sitbank_staging_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:5001;
        include /etc/nginx/snippets/sitbank-proxy-headers.conf;
        include /etc/nginx/snippets/sitbank-cloudflare-access-headers.conf;
    }

    location / {
        limit_req zone=sitbank_staging_app burst=40 nodelay;
        proxy_pass http://127.0.0.1:5001;
        include /etc/nginx/snippets/sitbank-proxy-headers.conf;
        include /etc/nginx/snippets/sitbank-cloudflare-access-headers.conf;
    }
}
