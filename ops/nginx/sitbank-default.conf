log_format sitbank_access_json escape=json
    '{"message":"nginx_access",'
    '"event":"http_request",'
    '"service":"nginx",'
    '"result":"$status",'
    '"status":$status,'
    '"method":"$request_method",'
    '"route":"$uri",'
    '"host":"$host",'
    '"body_bytes_sent":$body_bytes_sent,'
    '"request_length":$request_length,'
    '"request_time":"$request_time",'
    '"upstream_status":"$upstream_status",'
    '"upstream_response_time":"$upstream_response_time",'
    '"logged_at":"$time_iso8601"}';

server {
    listen __SITBANK_PUBLIC_BIND_ADDRESS__:80 default_server;
    server_name _;
    return 444;
}

server {
    listen __SITBANK_PUBLIC_BIND_ADDRESS__:443 ssl http2 default_server;
    server_name _;
    ssl_reject_handshake on;
    return 444;
}
