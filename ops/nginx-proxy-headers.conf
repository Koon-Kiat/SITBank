# Include these proxy headers in the Nginx location that forwards to Gunicorn.
# Nginx must overwrite, not append user-supplied forwarding headers.
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $remote_addr;
proxy_set_header X-Forwarded-Proto $scheme;

# Gunicorn is expected to bind only to 127.0.0.1.
# Flask uses Werkzeug ProxyFix with TRUSTED_PROXY_COUNT=1.
