name: sitbank-staging

services:
  postgres:
    image: postgres:16.9-alpine@sha256:7c688148e5e156d0e86df7ba8ae5a05a2386aaec1e2ad8e6d11bdf10504b1fb7
    container_name: sitbank-staging-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sitbank_staging
      POSTGRES_USER: sitbank_owner
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_owner_password
    secrets:
      - postgres_owner_password
      - postgres_app_password
    volumes:
      - sitbank-staging-postgres-data:/var/lib/postgresql/data
      - type: bind
        source: /etc/sitbank-staging/postgres/init-sitbank-staging-roles.sh
        target: /docker-entrypoint-initdb.d/10-sitbank-roles.sh
        read_only: true
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready --username sitbank_owner --dbname sitbank_staging
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - sitbank-staging
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "5"

  app:
    image: ${SITBANK_IMAGE:?SITBANK_IMAGE must be an immutable digest reference}
    container_name: sitbank-staging-app
    user: "10001:10001"
    read_only: true
    init: true
    restart: unless-stopped
    stop_grace_period: 35s
    command:
      - python
      - -m
      - gunicorn
      - --workers
      - "3"
      - --bind
      - 0.0.0.0:5000
      - --access-logfile
      - "-"
      - --error-logfile
      - "-"
      - --timeout
      - "30"
      - --graceful-timeout
      - "30"
      - wsgi:app
    ports:
      - 127.0.0.1:5001:5000
    depends_on:
      postgres:
        condition: service_healthy
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 768m
    mem_reservation: 256m
    cpus: 1.5
    ulimits:
      nofile:
        soft: 4096
        hard: 8192
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m,uid=10001,gid=10001,mode=1770
    env_file:
      - /etc/sitbank-staging/container.env
    environment:
      SECRET_KEY_FILE: /run/secrets/secret_key
      WTF_CSRF_SECRET_KEY_FILE: /run/secrets/wtf_csrf_secret_key
      SESSION_HMAC_KEYS_JSON_FILE: /run/secrets/session_hmac_keys_json
      SESSION_LOOKUP_HMAC_KEY_FILE: /run/secrets/session_lookup_hmac_key
      DATABASE_URL_FILE: /run/secrets/database_url
      MFA_KEK_KEYS_JSON_FILE: /run/secrets/mfa_kek_keys_json
      PASSWORD_PEPPER_B64_FILE: /run/secrets/password_pepper_b64
      SECURITY_AUDIT_HMAC_KEY_FILE: /run/secrets/security_audit_hmac_key
      SECURITY_ALERT_WEBHOOK_URL_FILE: /run/secrets/security_alert_webhook_url
      SMTP_USERNAME_FILE: /run/secrets/smtp_username
      SMTP_PASSWORD_FILE: /run/secrets/smtp_password
      TURNSTILE_SECRET_KEY_FILE: /run/secrets/turnstile_secret_key
    secrets:
      - source: secret_key
        target: secret_key
      - source: wtf_csrf_secret_key
        target: wtf_csrf_secret_key
      - source: session_hmac_keys_json
        target: session_hmac_keys_json
      - source: session_lookup_hmac_key
        target: session_lookup_hmac_key
      - source: database_url
        target: database_url
      - source: mfa_kek_keys_json
        target: mfa_kek_keys_json
      - source: password_pepper_b64
        target: password_pepper_b64
      - source: security_audit_hmac_key
        target: security_audit_hmac_key
      - source: security_alert_webhook_url
        target: security_alert_webhook_url
      - source: smtp_username
        target: smtp_username
      - source: smtp_password
        target: smtp_password
      - source: turnstile_secret_key
        target: turnstile_secret_key
    volumes:
      - type: bind
        source: /etc/sitbank-staging/common-passwords.txt
        target: /run/config/common-passwords.txt
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: /etc/sitbank-staging/fido-approved-aaguids.json
        target: /run/config/fido-approved-aaguids.json
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: /etc/sitbank-staging/fido-mds-cache.json
        target: /run/config/fido-mds-cache.json
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: /var/lib/sitbank-staging-container/security-alert-state
        target: /run/state
        read_only: false
        bind:
          create_host_path: false
    networks:
      - sitbank-staging
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "5"

  admin:
    image: ${SITBANK_IMAGE:?SITBANK_IMAGE must be an immutable digest reference}
    container_name: sitbank-staging-admin
    user: "10001:10001"
    read_only: true
    init: true
    restart: unless-stopped
    stop_grace_period: 35s
    command:
      - python
      - -m
      - gunicorn
      - --workers
      - "2"
      - --bind
      - 0.0.0.0:5000
      - --access-logfile
      - "-"
      - --error-logfile
      - "-"
      - --timeout
      - "30"
      - --graceful-timeout
      - "30"
      - admin_wsgi:app
    ports:
      - 127.0.0.1:5003:5000
    depends_on:
      postgres:
        condition: service_healthy
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 512m
    mem_reservation: 128m
    cpus: 1.0
    ulimits:
      nofile:
        soft: 4096
        hard: 8192
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m,uid=10001,gid=10001,mode=1770
    env_file:
      - /etc/sitbank-staging/container.env
    environment:
      ADMIN_SESSION_HMAC_ACTIVE_KEY_ID: 2026-06-admin
      ADMIN_SECRET_KEY_FILE: /run/secrets/admin_secret_key
      ADMIN_WTF_CSRF_SECRET_KEY_FILE: /run/secrets/admin_wtf_csrf_secret_key
      ADMIN_SESSION_HMAC_KEYS_JSON_FILE: /run/secrets/admin_session_hmac_keys_json
      ADMIN_SESSION_LOOKUP_HMAC_KEY_FILE: /run/secrets/admin_session_lookup_hmac_key
      ADMIN_DATABASE_URL_FILE: /run/secrets/admin_database_url
      MFA_KEK_KEYS_JSON_FILE: /run/secrets/mfa_kek_keys_json
      ADMIN_PASSWORD_PEPPER_B64_FILE: /run/secrets/admin_password_pepper_b64
      SECURITY_AUDIT_HMAC_KEY_FILE: /run/secrets/security_audit_hmac_key
      SECURITY_ALERT_WEBHOOK_URL_FILE: /run/secrets/security_alert_webhook_url
      SMTP_USERNAME_FILE: /run/secrets/smtp_username
      SMTP_PASSWORD_FILE: /run/secrets/smtp_password
    secrets:
      - source: admin_secret_key
        target: admin_secret_key
      - source: admin_wtf_csrf_secret_key
        target: admin_wtf_csrf_secret_key
      - source: admin_session_hmac_keys_json
        target: admin_session_hmac_keys_json
      - source: admin_session_lookup_hmac_key
        target: admin_session_lookup_hmac_key
      - source: admin_database_url
        target: admin_database_url
      - source: mfa_kek_keys_json
        target: mfa_kek_keys_json
      - source: admin_password_pepper_b64
        target: admin_password_pepper_b64
      - source: security_audit_hmac_key
        target: security_audit_hmac_key
      - source: security_alert_webhook_url
        target: security_alert_webhook_url
      - source: smtp_username
        target: smtp_username
      - source: smtp_password
        target: smtp_password
    volumes:
      - type: bind
        source: /etc/sitbank-staging/common-passwords.txt
        target: /run/config/common-passwords.txt
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: /etc/sitbank-staging/fido-approved-aaguids.json
        target: /run/config/fido-approved-aaguids.json
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: /etc/sitbank-staging/fido-mds-cache.json
        target: /run/config/fido-mds-cache.json
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: /var/lib/sitbank-staging-container/security-alert-state
        target: /run/state
        read_only: false
        bind:
          create_host_path: false
    networks:
      - sitbank-staging
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "5"

secrets:
  secret_key:
    file: /etc/sitbank-staging/secrets/secret_key
  wtf_csrf_secret_key:
    file: /etc/sitbank-staging/secrets/wtf_csrf_secret_key
  session_hmac_keys_json:
    file: /etc/sitbank-staging/secrets/session_hmac_keys_json
  session_lookup_hmac_key:
    file: /etc/sitbank-staging/secrets/session_lookup_hmac_key
  database_url:
    file: /etc/sitbank-staging/secrets/database_url
  database_migration_url:
    file: /etc/sitbank-staging/secrets/database_migration_url
  mfa_kek_keys_json:
    file: /etc/sitbank-staging/secrets/mfa_kek_keys_json
  password_pepper_b64:
    file: /etc/sitbank-staging/secrets/password_pepper_b64
  security_audit_hmac_key:
    file: /etc/sitbank-staging/secrets/security_audit_hmac_key
  security_alert_webhook_url:
    file: /etc/sitbank-staging/secrets/security_alert_webhook_url
  smtp_username:
    file: /etc/sitbank-staging/secrets/smtp_username
  smtp_password:
    file: /etc/sitbank-staging/secrets/smtp_password
  turnstile_secret_key:
    file: /etc/sitbank-staging/secrets/turnstile_secret_key
  postgres_owner_password:
    file: /etc/sitbank-staging/secrets/postgres_owner_password
  postgres_app_password:
    file: /etc/sitbank-staging/secrets/postgres_app_password
  admin_secret_key:
    file: /etc/sitbank-staging/secrets/admin_secret_key
  admin_wtf_csrf_secret_key:
    file: /etc/sitbank-staging/secrets/admin_wtf_csrf_secret_key
  admin_session_hmac_keys_json:
    file: /etc/sitbank-staging/secrets/admin_session_hmac_keys_json
  admin_session_lookup_hmac_key:
    file: /etc/sitbank-staging/secrets/admin_session_lookup_hmac_key
  admin_database_url:
    file: /etc/sitbank-staging/secrets/admin_database_url
  admin_password_pepper_b64:
    file: /etc/sitbank-staging/secrets/admin_password_pepper_b64

volumes:
  sitbank-staging-postgres-data:
    name: sitbank-staging-postgres-data

networks:
  sitbank-staging:
    name: sitbank-staging-network
