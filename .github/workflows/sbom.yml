name: Generate source SBOM

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-sbom:
    name: Generate CycloneDX source SBOM
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install pinned Syft
        id: syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610
        with:
          syft-version: v1.46.0

      - name: Generate CycloneDX JSON source SBOM
        shell: bash
        run: |
          set -euo pipefail
          "${{ steps.syft.outputs.cmd }}" \
            dir:. \
            --output cyclonedx-json=sitbank-source-sbom-cyclonedx.json
          jq empty sitbank-source-sbom-cyclonedx.json

      - name: Upload source SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sitbank-source-sbom
          path: sitbank-source-sbom-cyclonedx.json
          if-no-files-found: error
          retention-days: 30
