name: Generate source SBOM

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-sbom:
    name: Generate CycloneDX source SBOM
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install pinned Syft
        id: syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610
        with:
          syft-version: v1.46.0

      - name: Generate CycloneDX JSON source SBOM
        id: generate
        shell: bash
        run: |
          set -euo pipefail
          "${{ steps.syft.outputs.cmd }}" \
            dir:. \
            --output cyclonedx-json=sitbank-source-sbom-cyclonedx.json
          jq empty sitbank-source-sbom-cyclonedx.json

      - name: Summarize source SBOM
        if: ${{ always() }}
        shell: bash
        env:
          GENERATE_OUTCOME: ${{ steps.generate.outcome }}
        run: |
          {
            echo "## CycloneDX source SBOM"
            echo
            echo "- Status: **${GENERATE_OUTCOME}**"
            echo "- Artifact: \`sitbank-source-sbom\`"
            echo "- Format: CycloneDX JSON"
            if [[ -s sitbank-source-sbom-cyclonedx.json ]] \
              && jq empty sitbank-source-sbom-cyclonedx.json 2>/dev/null; then
              echo "- Components: \`$(jq '(.components // []) | length' sitbank-source-sbom-cyclonedx.json)\`"
              echo "- Dependency entries: \`$(jq '(.dependencies // []) | length' sitbank-source-sbom-cyclonedx.json)\`"
              echo "- Services: \`$(jq '(.services // []) | length' sitbank-source-sbom-cyclonedx.json)\`"
              echo
              python ops/security/render_sbom_summary.py \
                sitbank-source-sbom-cyclonedx.json
            else
              echo "- Counts: unavailable because valid SBOM output was not produced."
            fi
            echo
            echo "- The full SBOM remains in the artifact; this summary is intentionally bounded."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload source SBOM
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sitbank-source-sbom
          path: sitbank-source-sbom-cyclonedx.json
          if-no-files-found: error
          retention-days: 30
