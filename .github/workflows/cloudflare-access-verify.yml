name: Verify staging Cloudflare Access

on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: cloudflare-access-verify-staging
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    environment:
      name: staging
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
      STAGING_ACCESS_HOSTNAME: staging-sitbank.pp.ua
      STAGING_CLOUDFLARE_ACCESS_TEAM_DOMAIN: ${{ vars.STAGING_CLOUDFLARE_ACCESS_TEAM_DOMAIN }}
      STAGING_ACCESS_ALLOWED_EMAILS: ${{ secrets.STAGING_ACCESS_ALLOWED_EMAILS }}
      STAGING_ACCESS_ALLOWED_GROUP_IDS: ${{ secrets.STAGING_ACCESS_ALLOWED_GROUP_IDS }}
      STAGING_ACCESS_ALLOWED_IDP_IDS: ${{ vars.STAGING_ACCESS_ALLOWED_IDP_IDS }}
      STAGING_DNS_ORIGIN: ${{ secrets.STAGING_DNS_ORIGIN }}
      STAGING_ORIGIN_IP: ${{ secrets.STAGING_ORIGIN_IP }}
    steps:
      - name: Check out trusted repository state
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Verify Cloudflare Access and direct-origin denial
        shell: bash
        run: |
          python ops/cloudflare/provision-staging-access \
            --verify \
            --evidence-file "${RUNNER_TEMP}/cloudflare-access-evidence.json"

      - name: Upload sanitized verification evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: cloudflare-access-verification
          path: ${{ runner.temp }}/cloudflare-access-evidence.json
          if-no-files-found: error
          retention-days: 30
