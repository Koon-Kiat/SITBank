name: Gitleaks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "37 2 * * 1"

permissions:
  contents: read

concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Full-history secret scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out complete repository history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install checksum-verified Gitleaks 8.30.1
        shell: bash
        run: |
          set -euo pipefail

          readonly version="8.30.1"
          readonly archive="${RUNNER_TEMP}/gitleaks_${version}_linux_x64.tar.gz"
          readonly install_dir="${RUNNER_TEMP}/gitleaks-bin"
          readonly expected_sha256="551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"

          curl --fail --location --silent --show-error \
            --proto '=https' --tlsv1.2 \
            --output "${archive}" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz"
          echo "${expected_sha256}  ${archive}" | sha256sum --check --status
          mkdir -p "${install_dir}"
          tar --extract --gzip --file "${archive}" --directory "${install_dir}" gitleaks
          "${install_dir}/gitleaks" version

      - name: Scan repository and all Git history with redacted output
        id: scan
        shell: bash
        run: |
          set -euo pipefail

          set +e
          "${RUNNER_TEMP}/gitleaks-bin/gitleaks" git \
            --config .gitleaks.toml \
            --log-opts=--all \
            --redact \
            --no-banner \
            --no-color \
            --verbose \
            --report-format json \
            --report-path "${RUNNER_TEMP}/gitleaks-report.json" \
            .
          scan_status=$?
          set -e
          exit "${scan_status}"

      - name: Summarize secret scan
        if: ${{ always() }}
        shell: bash
        env:
          SCAN_OUTCOME: ${{ steps.scan.outcome }}
        run: |
          finding_count="unknown"
          if [[ -s "${RUNNER_TEMP}/gitleaks-report.json" ]] \
            && jq empty "${RUNNER_TEMP}/gitleaks-report.json" 2>/dev/null; then
            finding_count="$(jq 'length' "${RUNNER_TEMP}/gitleaks-report.json")"
          elif [[ "${SCAN_OUTCOME}" == "success" ]]; then
            finding_count="0"
          fi
          {
            echo "## Gitleaks full-history secret scan"
            echo
            echo "- Status: **${SCAN_OUTCOME}**"
            echo "- Scope: all refs in complete repository Git history."
            echo "- Redacted finding count: \`${finding_count}\`"
            echo "- Decision: any detected secret blocks the job."
            echo "- Matched values are never included in this summary."
          } >> "${GITHUB_STEP_SUMMARY}"
