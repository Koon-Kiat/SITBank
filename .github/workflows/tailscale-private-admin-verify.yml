name: Verify private Tailscale admin access

on:
  workflow_dispatch:
    inputs:
      private_admin_host:
        description: Private Tailscale admin hostname.
        required: false
        default: admin-sitbank.tailca101b.ts.net
        type: string
      auth_mode:
        description: Protected Tailscale credential mode.
        required: true
        default: oauth
        type: choice
        options:
          - oauth
          - authkey
permissions:
  contents: read

concurrency:
  group: admin-tailscale-verification
  cancel-in-progress: false

jobs:
  verify:
    name: Private-tailnet verification
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment:
      name: admin-tailscale
    env:
      TAILSCALE_PRIVATE_ADMIN_HOST: ${{ inputs.private_admin_host }}
      TAILSCALE_AUTH_MODE: ${{ inputs.auth_mode }}

    steps:
      - name: Validate private target before joining the tailnet
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "${TAILSCALE_PRIVATE_ADMIN_HOST}" =~ ^[A-Za-z0-9]([A-Za-z0-9.-]{0,251}[A-Za-z0-9])?$ ]]; then
            echo "::error::The admin verification target must be a hostname, not a URL or command fragment."
            exit 1
          fi
          if [[ "${TAILSCALE_AUTH_MODE}" != "oauth" \
            && "${TAILSCALE_AUTH_MODE}" != "authkey" ]]; then
            echo "::error::auth_mode must be oauth or authkey."
            exit 1
          fi

          readonly private_admin_url="https://${TAILSCALE_PRIVATE_ADMIN_HOST}"

          if curl --silent --head --max-time 8 \
            --output /dev/null "${private_admin_url}/login"; then
            echo "::error::Private admin responded before the protected runner joined the tailnet."
            exit 1
          fi

          {
            echo "## Private-tailnet verification"
            echo
            echo "- Private admin is not reachable from the public runner context."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Validate selected Tailscale credential
        shell: bash
        env:
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          set -euo pipefail

          if [[ "${TAILSCALE_AUTH_MODE}" == "oauth" \
            && ( -z "${TS_OAUTH_CLIENT_ID}" || -z "${TS_OAUTH_SECRET}" ) ]]; then
            echo "::error::OAuth mode requires TS_OAUTH_CLIENT_ID and TS_OAUTH_SECRET in the protected admin-tailscale environment."
            exit 1
          fi
          if [[ "${TAILSCALE_AUTH_MODE}" == "authkey" \
            && -z "${TAILSCALE_AUTH_KEY}" ]]; then
            echo "::error::Auth-key mode requires TAILSCALE_AUTH_KEY in the protected admin-tailscale environment."
            exit 1
          fi

      - name: Join the approved tailnet with OAuth
        if: inputs.auth_mode == 'oauth'
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-ci-admin-verify
          ping: ${{ inputs.private_admin_host }}

      - name: Join the approved tailnet with an auth key
        if: inputs.auth_mode == 'authkey'
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          ping: ${{ inputs.private_admin_host }}

      - name: Verify private admin entrypoint
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$(tailscale status --json | jq -r '.BackendState')" != "Running" ]]; then
            echo "::error::The protected runner did not establish a running tailnet session."
            exit 1
          fi

          if ! getent ahostsv4 "${TAILSCALE_PRIVATE_ADMIN_HOST}" > /dev/null; then
            echo "::error::Private admin hostname did not resolve inside the tailnet."
            exit 1
          fi

          private_status="$(
            curl --silent --show-error --head --max-time 15 \
              --output /dev/null --write-out '%{http_code}' \
              "https://${TAILSCALE_PRIVATE_ADMIN_HOST}/login"
          )"
          if [[ "${private_status}" != "200" ]]; then
            echo "::error::Private admin login entrypoint returned HTTP ${private_status}; expected 200."
            exit 1
          fi

          {
            echo "- Protected runner joined the approved tailnet."
            echo "- Private admin HTTPS login entrypoint returned the documented unauthenticated response."
            echo "- Required private admin gate passed."
            echo "- No admin credentials, cookies, deployment, Serve, or Funnel operations were used."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Disconnect ephemeral tailnet session
        if: ${{ always() }}
        shell: bash
        run: |
          sudo tailscale logout > /dev/null 2>&1 || true
