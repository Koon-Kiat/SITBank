name: PR DAST smoke

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-dast-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Local ephemeral application
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build local DAST image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          load: true
          tags: sitbank:pr-dast
          push: false

      - name: Run time-bounded local DAST smoke
        id: smoke
        shell: bash
        env:
          RUN_ZAP_BASELINE: "true"
        run: timeout --signal=TERM 12m bash ops/container/smoke-test.sh sitbank:pr-dast

      - name: Write sanitized DAST summary
        if: ${{ always() }}
        shell: bash
        env:
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
        run: |
          install -d -m 0755 pr-dast-report
          {
            echo "scope=local-ephemeral-application"
            echo "target=isolated-docker-network"
            echo "authentication=synthetic-local-session"
            echo "timeout=12m"
            echo "blocking-threshold=zap-fail-alert-or-smoke-regression"
            echo "outcome=${SMOKE_OUTCOME}"
          } > pr-dast-report/summary.txt
          if [[ "${SMOKE_OUTCOME}" == "success" ]]; then
            blocking_findings="0"
          else
            blocking_findings="unavailable; inspect the bounded job log"
          fi
          {
            echo "## PR DAST smoke"
            echo
            echo "- Status: **${SMOKE_OUTCOME}**"
            echo "- Target: isolated local ephemeral application."
            echo "- Authentication: synthetic local session."
            echo "- Blocking finding count: ${blocking_findings}."
            echo "- Artifact: \`pr-dast-smoke-${GITHUB_RUN_ID}\` contains the sanitized scope/outcome summary."
            echo "- Decision: any ZAP fail alert or smoke regression blocks this job."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload sanitized DAST summary
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: pr-dast-smoke-${{ github.run_id }}
          path: pr-dast-report/summary.txt
          if-no-files-found: error
          retention-days: 7
