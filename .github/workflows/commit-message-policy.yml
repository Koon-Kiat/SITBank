name: Commit message policy

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  commit-message-policy:
    name: Commit message
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out pull request history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate commit subjects
        id: validate
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -Eeuo pipefail

          failed=0

          annotation_escape() {
            local value="$1"
            value="${value//'%'/'%25'}"
            value="${value//$'\r'/'%0D'}"
            value="${value//$'\n'/'%0A'}"
            printf '%s' "$value"
          }

          print_examples() {
            cat <<'EXAMPLES'
          Good examples:
            Fix: staging admin secret wiring
            Feat: add admin deployment boundary
            Chore(deps): bump msgpack to 1.2.1
            Docs: update deployment notes
            Security: harden admin session validation
            Fix staging admin secret wiring
            Add commit subject validation
            Harden admin session validation
            Production deployment is manual only

          Bad examples:
            fix: staging admin secret wiring
            feat: add admin deployment boundary
            chore(deps): bump msgpack to 1.2.1
            fix staging admin secret wiring
            wip
            update stuff
            Fix bug.
            minor changes
          EXAMPLES
          }

          report_error() {
            local sha="$1"
            local subject="$2"
            local message="$3"
            local escaped_subject
            escaped_subject="$(annotation_escape "${subject}")"
            echo "::error title=Invalid commit subject::${sha}: ${message} Subject: ${escaped_subject}"
            failed=1
          }

          validate_message() {
            local sha="$1"
            local value="$2"
            local lower_value

            if [[ "${value}" =~ ^Merge[[:space:]] ]] || [[ "${value}" =~ ^Revert[[:space:]] ]]; then
              return 0
            fi

            if [[ -z "${value}" ]]; then
              report_error "${sha}" "${value}" "Commit subject must not be empty."
              return 1
            fi

            if [[ "${value}" =~ ^[[:space:]] || "${value}" =~ [[:space:]]$ ]]; then
              report_error "${sha}" "${value}" "Commit subject must not have leading or trailing whitespace."
              return 1
            fi

            if (( ${#value} < 12 )); then
              report_error "${sha}" "${value}" "Commit subject must be at least 12 characters."
              return 1
            fi

            if (( ${#value} > 72 )); then
              report_error "${sha}" "${value}" "Commit subject must be at most 72 characters."
              return 1
            fi

            if [[ ! "${value}" =~ ^[A-Z] ]]; then
              report_error "${sha}" "${value}" "Commit subject must start with a capital letter."
              return 1
            fi

            if [[ "${value}" == *. ]]; then
              report_error "${sha}" "${value}" "Commit subject must not end with a full stop."
              return 1
            fi

            lower_value="${value,,}"
            case "${lower_value}" in
              fix|update|updates|changes|change|wip|test|tests|misc|stuff|done|bug|bugs|final|commit|temp|tmp|work|progress)
                report_error "${sha}" "${value}" "Commit subject is too generic."
                return 1
                ;;
              "fix bug"|"fix bugs"|"fix issue"|"fix issues"|"update stuff"|"update things"|"make changes"|"minor changes")
                report_error "${sha}" "${value}" "Commit subject is too vague."
                return 1
                ;;
            esac
          }

          while IFS= read -r -d '' sha && IFS= read -r -d '' subject; do
            validate_message "${sha}" "${subject}" || true
          done < <(git log --first-parent --format='%H%x00%s%x00' "${BASE_SHA}..${HEAD_SHA}")

          if (( failed != 0 )); then
            print_examples
            exit 1
          fi

          echo "Commit message policy passed."

      - name: Summarize commit message policy
        if: ${{ always() }}
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          VALIDATION_OUTCOME: ${{ steps.validate.outcome }}
        run: |
          commit_count="unknown"
          if value="$(git rev-list --first-parent --count "${BASE_SHA}..${HEAD_SHA}" 2>/dev/null)"; then
            commit_count="${value}"
          fi
          {
            echo "## Commit message policy"
            echo
            echo "- Status: **${VALIDATION_OUTCOME}**"
            echo "- Scope: \`${commit_count}\` pull request commit subject(s)."
            echo "- Decision: subjects must satisfy the repository contribution message policy."
          } >> "${GITHUB_STEP_SUMMARY}"
