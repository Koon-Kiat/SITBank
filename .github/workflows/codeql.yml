name: CodeQL

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "17 2 * * 3"

permissions: {}

concurrency:
  group: codeql-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze-python:
    name: Python analysis
    if: github.event.repository.private == false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        id: initialize
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          build-mode: none
          languages: python
          queries: security-extended

      - name: Analyze Python
        id: analyze
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a
        with:
          category: /language:python

      - name: Summarize CodeQL analysis
        if: ${{ always() }}
        shell: bash
        env:
          INITIALIZE_OUTCOME: ${{ steps.initialize.outcome }}
          ANALYZE_OUTCOME: ${{ steps.analyze.outcome }}
        run: |
          {
            echo "## CodeQL Python analysis"
            echo
            echo "- Status: **${ANALYZE_OUTCOME}**"
            echo "- Scope: repository Python source with \`security-extended\` queries."
            echo "- Initialization: \`${INITIALIZE_OUTCOME}\`"
            echo "- Decision: blocking CodeQL analysis must complete successfully."
            echo "- Detailed findings remain in GitHub code scanning."
          } >> "${GITHUB_STEP_SUMMARY}"
