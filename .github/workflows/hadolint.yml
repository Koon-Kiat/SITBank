name: Hadolint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hadolint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Repository Dockerfiles
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Discover tracked Dockerfiles
        shell: bash
        run: |
          set -euo pipefail
          python ops/security/discover_lint_targets.py dockerfile --format nul \
            > "${RUNNER_TEMP}/hadolint-targets"
          test -s "${RUNNER_TEMP}/hadolint-targets"

      - name: Install checksum-verified Hadolint 2.14.0
        shell: bash
        run: |
          set -euo pipefail

          readonly version="2.14.0"
          readonly binary="${RUNNER_TEMP}/hadolint"
          readonly expected_sha256="6bf226944684f56c84dd014e8b979d27425c0148f61b3bd99bcc6f39e9dc5a47"

          curl --fail --location --silent --show-error \
            --proto '=https' --tlsv1.2 \
            --output "${binary}" \
            "https://github.com/hadolint/hadolint/releases/download/v${version}/hadolint-linux-x86_64"
          echo "${expected_sha256}  ${binary}" | sha256sum --check --status
          chmod 0755 "${binary}"
          "${binary}" --version

      - name: Scan every discovered Dockerfile
        id: scan
        shell: bash
        run: |
          set -euo pipefail
          set +e
          xargs --null --no-run-if-empty \
            "${RUNNER_TEMP}/hadolint" \
            --failure-threshold style \
            --format json \
            > "${RUNNER_TEMP}/hadolint-report.json" \
            < "${RUNNER_TEMP}/hadolint-targets"
          scan_status=$?
          set -e
          exit "${scan_status}"

      - name: Summarize Dockerfile lint
        if: ${{ always() }}
        shell: bash
        env:
          SCAN_OUTCOME: ${{ steps.scan.outcome }}
        run: |
          target_count="unknown"
          if [[ -f "${RUNNER_TEMP}/hadolint-targets" ]]; then
            target_count="$(
              python3 -c 'import pathlib,sys; print(len([v for v in pathlib.Path(sys.argv[1]).read_bytes().split(b"\0") if v]))' \
                "${RUNNER_TEMP}/hadolint-targets"
            )"
          fi
          finding_count="unknown"
          if [[ -s "${RUNNER_TEMP}/hadolint-report.json" ]] \
            && jq empty "${RUNNER_TEMP}/hadolint-report.json" 2>/dev/null; then
            finding_count="$(jq 'length' "${RUNNER_TEMP}/hadolint-report.json")"
          elif [[ "${SCAN_OUTCOME}" == "success" ]]; then
            finding_count="0"
          fi
          {
            echo "## Hadolint"
            echo
            echo "- Status: **${SCAN_OUTCOME}**"
            echo "- Scanned Dockerfiles: \`${target_count}\`"
            echo "- Findings at style or higher: \`${finding_count}\`"
            if [[ -s "${RUNNER_TEMP}/hadolint-report.json" ]] \
              && jq empty "${RUNNER_TEMP}/hadolint-report.json" 2>/dev/null; then
              echo
              echo "| Level | Rule | File | Line | Message |"
              echo "| --- | --- | --- | ---: | --- |"
              jq -r '.[:20][] | "| \(.level) | `\(.code)` | `\(.file)` | \(.line) | \(.message | gsub("[|\\r\\n]"; " ")) |"' \
                "${RUNNER_TEMP}/hadolint-report.json"
            fi
            echo
            echo "- Decision: findings at the configured style threshold block this job."
          } >> "${GITHUB_STEP_SUMMARY}"
