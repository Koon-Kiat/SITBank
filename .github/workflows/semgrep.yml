name: Semgrep

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "43 3 * * 1"

permissions:
  contents: read

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: High-severity SAST
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      SEMGREP_IMAGE: semgrep/semgrep:1.168.0@sha256:59fbed6127ea7c5dde3ba6a85142733bb20ea9aaa36120c953904f1539aaf66e

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Run local OSS Semgrep scan
        id: scan
        shell: bash
        run: |
          set -euo pipefail
          set +e
          docker run --rm \
            --volume "${GITHUB_WORKSPACE}:/src:ro" \
            --workdir /src \
            "${SEMGREP_IMAGE}" \
            semgrep scan \
              --metrics=off \
              --config p/python \
              --config p/flask \
              --config p/security-audit \
              --config p/owasp-top-ten \
              --config p/github-actions \
              --severity ERROR \
              --error \
              --json \
              --exclude .venv \
              --exclude venv \
              --exclude .pytest_cache \
              --exclude .pytest-tmp \
              --exclude coverage \
              --exclude htmlcov \
              --exclude node_modules \
              --exclude dist \
              --exclude build \
              . > "${RUNNER_TEMP}/semgrep-summary.json"
          scan_status=$?
          set -e
          exit "${scan_status}"

      - name: Summarize SAST
        if: ${{ always() }}
        shell: bash
        env:
          SCAN_OUTCOME: ${{ steps.scan.outcome }}
        run: |
          finding_count="unknown"
          if [[ -s "${RUNNER_TEMP}/semgrep-summary.json" ]] \
            && jq empty "${RUNNER_TEMP}/semgrep-summary.json" 2>/dev/null; then
            finding_count="$(jq '(.results // []) | length' "${RUNNER_TEMP}/semgrep-summary.json")"
          elif [[ "${SCAN_OUTCOME}" == "success" ]]; then
            finding_count="0"
          fi
          {
            echo "## Semgrep high-severity SAST"
            echo
            echo "- Status: **${SCAN_OUTCOME}**"
            echo "- Scope: Python, Flask, security-audit, OWASP Top 10, and GitHub Actions rules."
            echo "- ERROR-severity findings: \`${finding_count}\`"
            if [[ -s "${RUNNER_TEMP}/semgrep-summary.json" ]] \
              && jq empty "${RUNNER_TEMP}/semgrep-summary.json" 2>/dev/null; then
              echo
              echo "| Rule | Path | Line | Message |"
              echo "| --- | --- | ---: | --- |"
              jq -r '(.results // [])[:20][] | "| `\(.check_id)` | `\(.path)` | \(.start.line) | \((.extra.message // "") | gsub("[|\\r\\n]"; " ")) |"' \
                "${RUNNER_TEMP}/semgrep-summary.json"
            fi
            echo
            echo "- Decision: any configured ERROR-severity finding blocks this job."
            echo "- Full raw scanner payloads are not copied into this summary."
          } >> "${GITHUB_STEP_SUMMARY}"
