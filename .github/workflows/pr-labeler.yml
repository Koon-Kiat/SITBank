name: Pull request labeler

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label:
    name: Label pull request
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      # Use only the trusted base commit. Pull request code and scripts are
      # never checked out or executed by this label-only workflow.
      - name: Check out trusted base label policy
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Detect trusted label policy
        id: trusted-policy
        shell: bash
        run: |
          set -Eeuo pipefail
          if [[ -f ops/security/github_label_policy.py ]]; then
            echo "available=true" >> "${GITHUB_OUTPUT}"
          else
            echo "available=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::The trusted base does not contain the label policy yet; skipping this bootstrap run."
          fi

      - name: Ensure standard labels exist
        id: ensure-labels
        if: steps.trusted-policy.outputs.available == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -Eeuo pipefail
          definitions_file="${RUNNER_TEMP}/label-definitions.tsv"
          python ops/security/github_label_policy.py definitions > "${definitions_file}"
          while IFS=$'\t' read -r label description color; do
            gh label create "${label}" \
              --description "${description}" \
              --color "${color}" \
              --force
          done < "${definitions_file}"

      - name: Add bounded pull request labels
        id: apply-labels
        if: steps.trusted-policy.outputs.available == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -Eeuo pipefail
          pr_number="$(jq -r '.pull_request.number' "${GITHUB_EVENT_PATH}")"
          paths_file="${RUNNER_TEMP}/pr-paths.json"
          if gh pr diff "${pr_number}" --name-only > "${RUNNER_TEMP}/pr-paths.txt"; then
            jq -R -s \
              'split("\n") | map(select(length > 0)) | {paths: .}' \
              "${RUNNER_TEMP}/pr-paths.txt" > "${paths_file}"
          else
            echo "::warning::Could not load changed paths for PR #${pr_number}; using trusted event text only."
            printf '%s\n' '{"paths":[]}' > "${paths_file}"
          fi
          jq -s '.[0] * .[1]' "${GITHUB_EVENT_PATH}" "${paths_file}" \
            > "${RUNNER_TEMP}/label-input.json"
          labels_file="${RUNNER_TEMP}/computed-labels.txt"
          python ops/security/github_label_policy.py compute \
            --kind pr \
            --input "${RUNNER_TEMP}/label-input.json" \
            > "${labels_file}"
          mapfile -t labels < "${labels_file}"
          if (( ${#labels[@]} == 0 )); then
            exit 0
          fi
          IFS=,
          gh pr edit "${pr_number}" --add-label "${labels[*]}"

      - name: Summarize pull request labels
        if: ${{ always() }}
        shell: bash
        env:
          POLICY_AVAILABLE: ${{ steps.trusted-policy.outputs.available }}
          ENSURE_OUTCOME: ${{ steps.ensure-labels.outcome }}
          APPLY_OUTCOME: ${{ steps.apply-labels.outcome }}
        run: |
          {
            echo "## Pull request label policy"
            echo
            echo "- Trusted base policy available: \`${POLICY_AVAILABLE:-unknown}\`"
            echo "- Standard-label reconciliation: **${ENSURE_OUTCOME}**"
            echo "- Label decision: **${APPLY_OUTCOME}**"
            if [[ -s "${RUNNER_TEMP}/computed-labels.txt" ]]; then
              echo "- Computed labels:"
              label_count=0
              while IFS= read -r label && (( label_count < 20 )); do
                printf "  - \`%s\`\n" "${label}"
                label_count=$((label_count + 1))
              done < "${RUNNER_TEMP}/computed-labels.txt"
            else
              echo "- Computed labels: none or unavailable."
            fi
            echo "- Scope: trusted base policy plus bounded pull request metadata and changed paths."
          } >> "${GITHUB_STEP_SUMMARY}"
