name: ShellCheck

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: shellcheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Repository shell scripts
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Discover tracked shell scripts
        shell: bash
        run: |
          set -euo pipefail
          python ops/security/discover_lint_targets.py shell --format nul \
            > "${RUNNER_TEMP}/shellcheck-targets"
          test -s "${RUNNER_TEMP}/shellcheck-targets"

      - name: Install checksum-verified ShellCheck 0.11.0
        shell: bash
        run: |
          set -euo pipefail

          readonly version="0.11.0"
          readonly archive="${RUNNER_TEMP}/shellcheck.tar.xz"
          readonly expected_sha256="8c3be12b05d5c177a04c29e3c78ce89ac86f1595681cab149b65b97c4e227198"

          curl --fail --location --silent --show-error \
            --proto '=https' --tlsv1.2 \
            --output "${archive}" \
            "https://github.com/koalaman/shellcheck/releases/download/v${version}/shellcheck-v${version}.linux.x86_64.tar.xz"
          echo "${expected_sha256}  ${archive}" | sha256sum --check --status
          tar --extract --xz --file "${archive}" --directory "${RUNNER_TEMP}"
          "${RUNNER_TEMP}/shellcheck-v${version}/shellcheck" --version

      - name: Scan every discovered shell script
        id: scan
        shell: bash
        run: |
          set -euo pipefail
          set +e
          xargs --null --no-run-if-empty \
            "${RUNNER_TEMP}/shellcheck-v0.11.0/shellcheck" \
            --severity=style \
            --format=json1 \
            > "${RUNNER_TEMP}/shellcheck-report.json" \
            < "${RUNNER_TEMP}/shellcheck-targets"
          scan_status=$?
          set -e
          exit "${scan_status}"

      - name: Summarize shell lint
        if: ${{ always() }}
        shell: bash
        env:
          SCAN_OUTCOME: ${{ steps.scan.outcome }}
        run: |
          target_count="unknown"
          if [[ -f "${RUNNER_TEMP}/shellcheck-targets" ]]; then
            target_count="$(
              python3 -c 'import pathlib,sys; print(len([v for v in pathlib.Path(sys.argv[1]).read_bytes().split(b"\0") if v]))' \
                "${RUNNER_TEMP}/shellcheck-targets"
            )"
          fi
          finding_count="unknown"
          if [[ -s "${RUNNER_TEMP}/shellcheck-report.json" ]] \
            && jq empty "${RUNNER_TEMP}/shellcheck-report.json" 2>/dev/null; then
            finding_count="$(jq '.comments | length' "${RUNNER_TEMP}/shellcheck-report.json")"
          elif [[ "${SCAN_OUTCOME}" == "success" ]]; then
            finding_count="0"
          fi
          {
            echo "## ShellCheck"
            echo
            echo "- Status: **${SCAN_OUTCOME}**"
            echo "- Scanned shell files: \`${target_count}\`"
            echo "- Findings at style or higher: \`${finding_count}\`"
            if [[ -s "${RUNNER_TEMP}/shellcheck-report.json" ]] \
              && jq empty "${RUNNER_TEMP}/shellcheck-report.json" 2>/dev/null; then
              echo
              echo "| Level | Rule | File | Line | Message |"
              echo "| --- | --- | --- | ---: | --- |"
              jq -r '.comments[:20][] | "| \(.level) | `SC\(.code)` | `\(.file)` | \(.line) | \(.message | gsub("[|\\r\\n]"; " ")) |"' \
                "${RUNNER_TEMP}/shellcheck-report.json"
            fi
            echo
            echo "- Decision: findings at the configured style threshold block this job."
          } >> "${GITHUB_STEP_SUMMARY}"
