name: SonarQube Cloud

on:
  workflow_call:
    inputs:
      coverage_artifact:
        description: Name of the coverage.xml artifact produced by the CI test job.
        required: true
        type: string
      source_sha:
        description: Immutable source commit analyzed by the CI test job.
        required: true
        type: string
    secrets:
      SONAR_TOKEN:
        description: SonarQube Cloud project analysis token.
        required: false

permissions: {}

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - name: Check SonarQube Cloud credentials
        id: sonar
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          TRUSTED_EVENT: ${{ github.event_name != 'pull_request' || (github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository) }}
        run: |
          set -Eeuo pipefail
          if [[ "${TRUSTED_EVENT}" != "true" ]]; then
            echo "::notice title=SonarQube Cloud skipped::Cloud scan and PR comment are skipped for fork or Dependabot PRs because repository secrets/write permissions are not available."
            echo "should_scan=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if [[ -z "${SONAR_TOKEN}" ]]; then
            echo "::error::SONAR_TOKEN is not configured. Add the SonarQube Cloud analysis token as a GitHub Actions repository or organization secret."
            exit 1
          fi
          echo "should_scan=true" >> "${GITHUB_OUTPUT}"

      - name: Check out analyzed source
        if: steps.sonar.outputs.should_scan == 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.source_sha }}

      # Pinned to actions/download-artifact v6.0.0 (Node.js 24).
      - name: Download SonarQube coverage report
        if: steps.sonar.outputs.should_scan == 'true'
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53
        with:
          name: ${{ inputs.coverage_artifact }}
          path: .

      # Pinned to SonarSource/sonarqube-scan-action v8.1.0.
      - name: Run reporting-only SonarQube Cloud analysis
        if: steps.sonar.outputs.should_scan == 'true'
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # Pinned to actions/github-script v7.0.1. Pull requests are issue comments
      # in the GitHub API, so issues: write is the only write permission needed.
      - name: Comment SonarQube summary on PR
        if: >-
          steps.sonar.outputs.should_scan == 'true' &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          github.actor != 'dependabot[bot]'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const marker = '<!-- sitbank-sonarqube-summary -->';
            const workflowUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const properties = {};
            try {
              for (const rawLine of fs.readFileSync('sonar-project.properties', 'utf8').split(/\r?\n/)) {
                const line = rawLine.trim();
                if (!line || line.startsWith('#')) continue;
                const separator = line.indexOf('=');
                if (separator === -1) continue;
                properties[line.slice(0, separator).trim()] = line.slice(separator + 1).trim();
              }
            } catch {
              core.notice('SonarQube dashboard link omitted because project properties could not be read.');
            }

            const safeIdentifier = /^[A-Za-z0-9_.:-]+$/;
            const organization = properties['sonar.organization'];
            const projectKey = properties['sonar.projectKey'];
            let findings = 'Full findings: check the SonarQube Cloud dashboard';
            if (
              safeIdentifier.test(organization || '') &&
              safeIdentifier.test(projectKey || '')
            ) {
              const dashboardUrl = new URL('https://sonarcloud.io/project/overview');
              dashboardUrl.searchParams.set('id', projectKey);
              findings = `Full findings: [SonarQube Cloud dashboard](${dashboardUrl.toString()})`;
            }

            const body = `${marker}
            ## SonarQube Cloud Analysis

            SonarQube Cloud analysis has completed for this PR.

            - Workflow run: [view this run](${workflowUrl})
            - ${findings}
            - Quality gate: reporting-only
            - Blocking status: the quality gate is not currently blocking

            SonarQube Cloud is reporting-only for now. Full findings are available in SonarQube Cloud.

            SonarQube Cloud is an additional code-quality and security analysis layer. It does not replace pytest, CodeQL, Semgrep, Bandit, Gitleaks/repository secret scanning, dependency auditing, Trivy, ShellCheck, Hadolint, Syft, deployment tests, or production guard tests.
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const existing = comments.find(comment =>
              comment.user?.login === 'github-actions[bot]' &&
              comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
