name: SonarQube Cloud

on:
  workflow_call:
    inputs:
      coverage_artifact:
        description: Name of the coverage.xml artifact produced by the CI test job.
        required: true
        type: string
      source_sha:
        description: Immutable source commit analyzed by the CI test job.
        required: true
        type: string
    secrets:
      SONAR_TOKEN:
        description: SonarQube Cloud project analysis token.
        required: false

permissions: {}

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Check SonarQube Cloud credentials
        id: sonar
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          TRUSTED_EVENT: ${{ github.event_name != 'pull_request' || (github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository) }}
        run: |
          set -Eeuo pipefail
          if [[ "${TRUSTED_EVENT}" != "true" ]]; then
            echo "::notice title=SonarQube Cloud skipped::Cloud scan and PR comment are skipped for fork or Dependabot PRs because repository secrets/write permissions are not available."
            echo "should_scan=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if [[ -z "${SONAR_TOKEN}" ]]; then
            echo "::error::SONAR_TOKEN is not configured. Add the SonarQube Cloud analysis token as a GitHub Actions repository or organization secret."
            exit 1
          fi
          echo "should_scan=true" >> "${GITHUB_OUTPUT}"

      - name: Check out analyzed source
        if: steps.sonar.outputs.should_scan == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.source_sha }}

      # Pinned to actions/download-artifact v6.0.0 (Node.js 24).
      - name: Download SonarQube coverage report
        if: steps.sonar.outputs.should_scan == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ inputs.coverage_artifact }}
          path: .

      # Pinned to SonarSource/sonarqube-scan-action v8.1.0.
      - name: Run reporting-only SonarQube Cloud analysis
        if: steps.sonar.outputs.should_scan == 'true'
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
