name: CI, publish, and deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHON_VERSION: "3.12"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  workflow-security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Install verified actionlint
        shell: bash
        run: |
          readonly version="1.7.12"
          readonly archive="actionlint_${version}_linux_amd64.tar.gz"
          readonly expected="8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "/tmp/${archive}" \
            "https://github.com/rhysd/actionlint/releases/download/v${version}/${archive}"
          printf '%s  %s\n' "${expected}" "/tmp/${archive}" \
            | sha256sum --check --strict
          tar --extract --gzip --file "/tmp/${archive}" \
            --directory /tmp actionlint
          sudo install -o root -g root -m 0755 \
            /tmp/actionlint /usr/local/bin/actionlint

      - name: Lint GitHub Actions workflows
        run: actionlint -color

      - name: Audit GitHub Actions workflows
        uses: zizmorcore/zizmor-action@a16621b09c6db4281f81a93cb393b05dcd7b7165
        with:
          advanced-security: false
          annotations: true
          min-confidence: high
          min-severity: medium
          online-audits: true
          persona: pedantic
          version: 1.25.2

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Review dependency changes
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48
        with:
          fail-on-severity: high

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      APP_ENV: testing
      SECRET_KEY: ci-secret-key-that-is-long-enough-for-tests
      WTF_CSRF_SECRET_KEY: ci-csrf-key-that-is-long-enough-for-tests
      SESSION_HMAC_ACTIVE_KEY_ID: ci-current
      SESSION_HMAC_KEYS_JSON: '{"ci-current":"MjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjI=","ci-previous":"MzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzM="}'
      DATABASE_URL: postgresql+psycopg2://ci:ci@127.0.0.1:5432/ci
      REDIS_URL: redis://:ci@127.0.0.1:6379/15
      MFA_AES256_GCM_KEY_B64: MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=
      PASSWORD_PEPPER_B64: MTExMTExMTExMTExMTExMTExMTExMTExMTExMTExMTE=
      PASSWORD_PBKDF2_ITERATIONS: "600000"
      COMMON_PASSWORDS_PATH: tests/fixtures/common_passwords.txt
      COMMON_PASSWORDS_MIN_ENTRIES: "100000"
      WEBAUTHN_RP_ID: sitbank.duckdns.org
      WEBAUTHN_RP_ORIGIN: https://sitbank.duckdns.org
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock

      - name: Install locked dependencies
        run: python -m pip install --require-hashes -r requirements-dev.lock

      - name: Run tests and security checks
        run: |
          python -m pytest -q
          python -m compileall app config.py wsgi.py
          python -m pip check
          python -m bandit -q -ll -r app ops config.py wsgi.py
          python -m pip_audit --disable-pip --require-hashes -r requirements.lock
          python -m pip_audit --disable-pip --require-hashes -r requirements-dev.lock
          python ops/security/check_dependency_locks.py
          python ops/security/scan_repository_secrets.py --history

  image-test:
    if: github.event_name == 'pull_request'
    needs: [test, workflow-security, dependency-review]
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Validate deployment shell scripts
        run: |
          shellcheck \
            ops/container/smoke-test.sh \
            ops/container/validate-compose.sh \
            ops/deploy/bootstrap-container-ec2 \
            ops/deploy/sitbank-container-deploy \
            ops/deploy/sitbank-container-runtime \
            ops/deploy/sitbank-database-cutover

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build local pull-request image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          load: true
          tags: sitbank:pr
          build-args: |
            VCS_REF=${{ github.sha }}
            SOURCE_URL=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container smoke and authenticated DAST tests
        env:
          RUN_ZAP_DAST: "true"
        run: bash ops/container/smoke-test.sh sitbank:pr

      - name: Validate the production Compose model
        run: bash ops/container/validate-compose.sh sitbank:pr

      - name: Block all critical vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: sitbank:pr
          format: table
          exit-code: "1"
          ignore-unfixed: false
          severity: CRITICAL

      - name: Block fixable high and critical vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: sitbank:pr
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  publish:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: [test, workflow-security]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      repository: ${{ steps.image.outputs.repository }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Resolve lowercase GHCR repository
        id: image
        shell: bash
        run: |
          repository="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "repository=${repository}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push the release candidate once
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image.outputs.repository }}:${{ github.sha }}
          build-args: |
            VCS_REF=${{ github.sha }}
            SOURCE_URL=${{ github.server_url }}/${{ github.repository }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-verify:
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      id-token: write
      packages: read
    outputs:
      digest: ${{ needs.publish.outputs.digest }}
      repository: ${{ needs.publish.outputs.repository }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Pull and verify release identity
        env:
          IMAGE: ${{ needs.publish.outputs.repository }}@${{ needs.publish.outputs.digest }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          docker pull "${IMAGE}"
          revision="$(
            docker image inspect \
              --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' \
              "${IMAGE}"
          )"
          test "${revision}" = "${RELEASE_SHA}"

      - name: Validate the production Compose model for the exact digest
        env:
          SITBANK_IMAGE: ${{ needs.publish.outputs.repository }}@${{ needs.publish.outputs.digest }}
        run: bash ops/container/validate-compose.sh "${SITBANK_IMAGE}"

      - name: Smoke-test and DAST-scan the exact published digest
        env:
          IMAGE: ${{ needs.publish.outputs.repository }}@${{ needs.publish.outputs.digest }}
          RUN_ZAP_DAST: "true"
        run: bash ops/container/smoke-test.sh "${IMAGE}"

      - name: Block all critical vulnerabilities in the published digest
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ needs.publish.outputs.repository }}@${{ needs.publish.outputs.digest }}
          format: table
          exit-code: "1"
          ignore-unfixed: false
          severity: CRITICAL

      - name: Block fixable high and critical vulnerabilities in the published digest
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ needs.publish.outputs.repository }}@${{ needs.publish.outputs.digest }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6

      - name: Sign and verify the tested immutable digest
        env:
          IMAGE: ${{ needs.publish.outputs.repository }}@${{ needs.publish.outputs.digest }}
        run: |
          cosign sign --yes "${IMAGE}"
          cosign verify \
            --certificate-identity "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/.github/workflows/ci-deploy.yml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE}" >/dev/null

  deploy:
    if: >-
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main' &&
      vars.PROD_DEPLOY_ENABLED == 'true'
    needs: release-verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      packages: read
    environment:
      name: production
      url: https://${{ vars.PROD_PUBLIC_HOST }}
    env:
      RELEASE_SHA: ${{ github.sha }}
      IMAGE_DIGEST: ${{ needs.release-verify.outputs.digest }}
      EC2_HOST: ${{ vars.EC2_HOST }}
      EC2_PORT: ${{ vars.EC2_PORT || '22' }}
      EC2_DEPLOY_USER: ${{ vars.EC2_DEPLOY_USER || 'sitbank-deploy' }}
      PROD_PUBLIC_HOST: ${{ vars.PROD_PUBLIC_HOST }}
      PROD_SESSION_HMAC_ACTIVE_KEY_ID: ${{ vars.PROD_SESSION_HMAC_ACTIVE_KEY_ID }}
      PROD_PASSWORD_PBKDF2_ITERATIONS: ${{ vars.PROD_PASSWORD_PBKDF2_ITERATIONS || '600000' }}
      PROD_MFA_ISSUER_NAME: ${{ vars.PROD_MFA_ISSUER_NAME || 'SITBank' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6

      - name: Render and sign non-secret runtime configuration
        run: |
          umask 077
          python ops/deploy/render_container_bundle.py \
            --environment-only \
            --output "runtime-${RELEASE_SHA}"
          tar --create --file "runtime-${RELEASE_SHA}.tar" \
            --directory "runtime-${RELEASE_SHA}" .
          sha256sum "runtime-${RELEASE_SHA}.tar" \
            > "runtime-${RELEASE_SHA}.sha256"
          cosign sign-blob --yes \
            --bundle "runtime-${RELEASE_SHA}.sigstore.json" \
            "runtime-${RELEASE_SHA}.tar"
          printf '%s\n%s\n' "${GITHUB_ACTOR}" "${GITHUB_TOKEN}" \
            > "registry-${RELEASE_SHA}.credentials"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Configure verified SSH
        env:
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EC2_KNOWN_HOSTS: ${{ secrets.EC2_KNOWN_HOSTS }}
        run: |
          install -d -m 0700 ~/.ssh
          printf '%s\n' "${EC2_SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 0600 ~/.ssh/id_ed25519
          printf '%s\n' "${EC2_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 0600 ~/.ssh/known_hosts

      - name: Upload authenticated deployment inputs
        run: |
          scp -P "${EC2_PORT}" -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes -o ConnectTimeout=15 \
            "runtime-${RELEASE_SHA}.tar" \
            "runtime-${RELEASE_SHA}.sha256" \
            "runtime-${RELEASE_SHA}.sigstore.json" \
            "registry-${RELEASE_SHA}.credentials" \
            "${EC2_DEPLOY_USER}@${EC2_HOST}:incoming/"

      - name: Deploy verified image digest
        run: |
          ssh -p "${EC2_PORT}" -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes -o ConnectTimeout=15 \
            "${EC2_DEPLOY_USER}@${EC2_HOST}" \
            "sudo /usr/local/sbin/sitbank-container-deploy '${RELEASE_SHA}' '${IMAGE_DIGEST}'"

      - name: Remove deployment credentials and bundles
        if: always()
        run: |
          rm -rf ~/.ssh/id_ed25519 \
            "runtime-${RELEASE_SHA}" \
            "runtime-${RELEASE_SHA}.tar" \
            "runtime-${RELEASE_SHA}.sha256" \
            "runtime-${RELEASE_SHA}.sigstore.json" \
            "registry-${RELEASE_SHA}.credentials"
