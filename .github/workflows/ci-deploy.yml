name: CI, publish, and deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "17 18 * * 1"
  workflow_dispatch:
    inputs:
      source_ref:
        description: Branch, tag, or commit SHA to build and deploy to staging.
        required: true
        type: string
      target_environment:
        description: Deployment target.
        required: true
        type: choice
        options:
          - staging
        default: staging
      deploy:
        description: Deploy the verified digest after release verification.
        required: true
        type: boolean
        default: false
      run_dast:
        description: Run authenticated DAST smoke crawl during release verification.
        required: true
        type: boolean
        default: true

permissions: {}

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('release-{0}', github.ref) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHON_VERSION: "3.12"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  resolve-source:
    name: Resolve source
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      source_ref_display: ${{ steps.resolve.outputs.source_ref_display }}
      source_sha: ${{ steps.resolve.outputs.source_sha }}
    steps:
      - name: Check out trusted workflow repository state
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.workflow_sha }}

      - name: Resolve candidate source to an immutable commit
        id: resolve
        shell: bash
        env:
          SOURCE_REF_INPUT: ${{ inputs.source_ref }}
          SOURCE_REF_HINT: ${{ github.head_ref || github.ref }}
          SOURCE_SHA_HINT: ${{ github.sha }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
              echo "::error::Manual staging must be dispatched from refs/heads/main."
              exit 1
            fi
            source_ref="${SOURCE_REF_INPUT}"
            if [[ -z "${source_ref}" || "${#source_ref}" -gt 255 \
                || "${source_ref}" == -* \
                || "${source_ref}" =~ [[:cntrl:]] ]]; then
              echo "::error::source_ref is empty or invalid."
              exit 1
            fi

            resolved=""
            if [[ "${source_ref}" =~ ^[0-9a-fA-F]{7,40}$ ]]; then
              resolved="${source_ref}"
            elif [[ "${source_ref}" == refs/heads/* ]]; then
              branch="${source_ref#refs/heads/}"
              git check-ref-format --branch "${branch}" >/dev/null
              resolved="refs/remotes/origin/${branch}"
            elif [[ "${source_ref}" == refs/tags/* ]]; then
              tag="${source_ref#refs/tags/}"
              git check-ref-format "refs/tags/${tag}"
              resolved="refs/tags/${tag}"
            else
              branch_exists=0
              tag_exists=0
              if git check-ref-format --branch "${source_ref}" >/dev/null 2>&1 \
                  && git show-ref --verify --quiet \
                    "refs/remotes/origin/${source_ref}"; then
                branch_exists=1
              fi
              if git check-ref-format "refs/tags/${source_ref}" >/dev/null 2>&1 \
                  && git show-ref --verify --quiet "refs/tags/${source_ref}"; then
                tag_exists=1
              fi
              if [[ "${branch_exists}" -eq 1 && "${tag_exists}" -eq 1 ]]; then
                echo "::error::source_ref is ambiguous; use refs/heads/ or refs/tags/."
                exit 1
              elif [[ "${branch_exists}" -eq 1 ]]; then
                resolved="refs/remotes/origin/${source_ref}"
              elif [[ "${tag_exists}" -eq 1 ]]; then
                resolved="refs/tags/${source_ref}"
              else
                echo "::error::source_ref does not identify a repository branch, tag, or commit."
                exit 1
              fi
            fi

            if ! source_sha="$(git rev-parse --verify "${resolved}^{commit}")" \
                || [[ ! "${source_sha}" =~ ^[0-9a-f]{40}$ ]]; then
              echo "::error::source_ref did not resolve to an immutable commit."
              exit 1
            fi
          else
            source_ref="${SOURCE_REF_HINT}"
            source_sha="${SOURCE_SHA_HINT}"
            if [[ ! "${source_sha}" =~ ^[0-9a-f]{40}$ ]]; then
              echo "::error::GitHub did not provide a valid source commit."
              exit 1
            fi
          fi

          source_ref_display="$(
            printf '%s' "${source_ref}" | tr -c 'A-Za-z0-9._/@+-' '_'
          )"
          {
            echo "source_ref_display=${source_ref_display}"
            echo "source_sha=${source_sha}"
          } >> "${GITHUB_OUTPUT}"

  workflow-security:
    name: Workflow security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install verified actionlint
        shell: bash
        run: |
          readonly version="1.7.12"
          readonly archive="actionlint_${version}_linux_amd64.tar.gz"
          readonly expected="8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "/tmp/${archive}" \
            "https://github.com/rhysd/actionlint/releases/download/v${version}/${archive}"
          printf '%s  %s\n' "${expected}" "/tmp/${archive}" \
            | sha256sum --check --strict
          tar --extract --gzip --file "/tmp/${archive}" \
            --directory /tmp actionlint
          sudo install -o root -g root -m 0755 \
            /tmp/actionlint /usr/local/bin/actionlint

      - name: Lint GitHub Actions workflows
        run: actionlint -color

      - name: Audit GitHub Actions workflows
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          advanced-security: false
          annotations: true
          min-confidence: high
          min-severity: medium
          online-audits: true
          persona: pedantic

  dependency-review:
    name: Dependency review
    if: >-
      github.event_name == 'pull_request' &&
      (github.event.repository.visibility == 'public' ||
        (vars['ENABLE_GITHUB_CODE_SECURITY'] || 'false') == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          fail-on-severity: high

      - name: Summarize dependency review scope
        if: always()
        shell: bash
        run: |
          {
            echo "## Dependency review"
            echo
            echo "This PR-only job compares dependency changes for pull requests targeting main."
            echo "Public repositories are eligible without ENABLE_GITHUB_CODE_SECURITY."
            echo "Private repositories require ENABLE_GITHUB_CODE_SECURITY=true."
          } >> "${GITHUB_STEP_SUMMARY}"

  test:
    name: Test and security checks
    needs: [workflow-security, resolve-source]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      APP_ENV: testing
      SECRET_KEY: ci-secret-key-that-is-long-enough-for-tests
      WTF_CSRF_SECRET_KEY: ci-csrf-key-that-is-long-enough-for-tests
      SESSION_HMAC_ACTIVE_KEY_ID: ci-current
      SESSION_HMAC_KEYS_JSON: '{"ci-current":"MjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjI=","ci-previous":"MzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzM="}'
      SESSION_LOOKUP_HMAC_KEY: OTk5OTk5OTk5OTk5OTk5OTk5OTk5OTk5OTk5OTk5OTk=
      DATABASE_URL: postgresql+psycopg2://ci:ci@127.0.0.1:5432/ci
      MFA_KEK_ACTIVE_ID: ci-mfa
      MFA_KEK_KEYS_JSON: '{"ci-mfa":"NDQ0NDQ0NDQ0NDQ0NDQ0NDQ0NDQ0NDQ0NDQ0NDQ0NDQ="}'
      TRANSACTION_LEDGER_HMAC_ACTIVE_KEY_ID: ci-ledger
      TRANSACTION_LEDGER_HMAC_KEYS_JSON: '{"ci-ledger":"YmJiYmJiYmJiYmJiYmJiYmJiYmJiYmJiYmJiYmJiYmI="}'
      PASSWORD_PEPPER_B64: MTExMTExMTExMTExMTExMTExMTExMTExMTExMTExMTE=
      PASSWORD_PBKDF2_ITERATIONS: "600000"
      COMMON_PASSWORDS_PATH: tests/fixtures/common_passwords.txt
      COMMON_PASSWORDS_MIN_ENTRIES: "100000"
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ needs.resolve-source.outputs.source_sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          # setup-python's pip cache key includes runner OS, Python version, and these lockfile hashes.
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock

      - name: Install locked dependencies
        run: python -m pip install --require-hashes -r requirements-dev.lock

      - name: Run tests and security checks
        run: |
          python -m pytest -q -n auto --cov=. --cov-config=.coveragerc --cov-report=xml:coverage.xml --cov-report=term --durations=30 --durations-min=0.5
          node tests/js/collect-browser-coverage.mjs
          python -m compileall app config.py wsgi.py admin_wsgi.py
          python -m pip check
          python -m bandit -q -ll -r app ops config.py wsgi.py admin_wsgi.py
          python -m pip_audit --disable-pip --require-hashes -r requirements.lock
          python -m pip_audit --disable-pip --require-hashes -r requirements-dev.lock
          python ops/security/check_dependency_locks.py
          python ops/security/scan_repository_secrets.py --history

      # Pinned to actions/upload-artifact v7.0.1 (Node.js 24).
      - name: Upload SonarQube coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sonarqube-coverage-${{ github.run_id }}
          path: |
            coverage.xml
            coverage/lcov.info
          if-no-files-found: error
          retention-days: 1

  playwright-e2e:
    name: Playwright E2E browser tests
    needs: [workflow-security, resolve-source]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      APP_ENV: testing
      SITBANK_RUN_E2E: "1"
      SITBANK_E2E_HEADLESS: "1"
      PLAYWRIGHT_BROWSERS_PATH: .playwright-browsers
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ needs.resolve-source.outputs.source_sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock

      - name: Install locked dependencies
        run: python -m pip install --require-hashes -r requirements-dev.lock

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: python -m pytest -q tests/e2e

  sonarqube:
    name: SonarQube analysis
    if: github.event_name != 'schedule'
    needs: [test, resolve-source]
    permissions:
      contents: read
    uses: ./.github/workflows/sonarqube.yml
    with:
      coverage_artifact: sonarqube-coverage-${{ github.run_id }}
      source_sha: ${{ needs.resolve-source.outputs.source_sha }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  sonarqube-comment:
    name: SonarQube PR comment
    if: >-
      needs.sonarqube.result == 'success' &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'dependabot[bot]'
    needs: [sonarqube, resolve-source]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out SonarQube project metadata
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          ref: ${{ needs.resolve-source.outputs.source_sha }}

      # Pinned to actions/github-script v9.0.0 (Node.js 24). The live GitHub
      # API response for PR comments accepted pull-requests: write.
      - name: Comment SonarQube summary on PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const marker = '<!-- sitbank-sonarqube-summary -->';
            const workflowUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const properties = {};
            try {
              for (const rawLine of fs.readFileSync('sonar-project.properties', 'utf8').split(/\r?\n/)) {
                const line = rawLine.trim();
                if (!line || line.startsWith('#')) continue;
                const separator = line.indexOf('=');
                if (separator === -1) continue;
                properties[line.slice(0, separator).trim()] = line.slice(separator + 1).trim();
              }
            } catch {
              core.notice('SonarQube dashboard link omitted because project properties could not be read.');
            }

            const safeIdentifier = /^[A-Za-z0-9_.:-]+$/;
            const organization = properties['sonar.organization'];
            const projectKey = properties['sonar.projectKey'];
            let findings = 'Full findings: check the SonarQube Cloud dashboard';
            if (
              safeIdentifier.test(organization || '') &&
              safeIdentifier.test(projectKey || '')
            ) {
              const dashboardUrl = new URL('https://sonarcloud.io/project/overview');
              dashboardUrl.searchParams.set('id', projectKey);
              findings = `Full findings: [SonarQube Cloud dashboard](${dashboardUrl.toString()})`;
            }

            const body = `${marker}
            ## SonarQube Cloud Analysis

            SonarQube Cloud analysis has completed for this PR.

            - Workflow run: [view this run](${workflowUrl})
            - ${findings}
            - Quality gate: enforced
            - Blocking status: this analysis must pass for trusted pull requests and release-producing runs

            SonarQube Cloud is a blocking quality gate for trusted runs. Full findings are available in SonarQube Cloud.

            SonarQube Cloud is an additional code-quality and security analysis layer. It does not replace pytest, CodeQL, Semgrep, Bandit, Gitleaks, the custom repository secret scanner, dependency auditing, Trivy, ShellCheck, Hadolint, Syft, deployment tests, or production guard tests.
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const existing = comments.find(comment =>
              comment.user?.login === 'github-actions[bot]' &&
              comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

  image-test:
    name: Container image test
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    needs: [test, workflow-security]
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build local pull-request image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          load: true
          tags: sitbank:pr
          pull: ${{ github.event_name == 'schedule' }}
          no-cache: ${{ github.event_name == 'schedule' }}
          build-args: |
            VCS_REF=${{ github.sha }}
            SOURCE_URL=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container smoke test and scheduled authenticated DAST
        env:
          RUN_ZAP_DAST: ${{ github.event_name == 'schedule' && 'true' || 'false' }}
        run: bash ops/container/smoke-test.sh sitbank:pr

      - name: Validate production and staging Compose models
        run: bash ops/container/validate-compose.sh sitbank:pr

      # zizmor: ignore[unpinned-tools] Trivy action is SHA-pinned; the action installs a pinned Trivy tool version.
      - name: Report all critical vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        env:
          TRIVY_IGNOREFILE: /dev/null
        with:
          image-ref: sitbank:pr
          format: table
          exit-code: "0"
          ignore-unfixed: false
          severity: CRITICAL
          version: v0.72.0

      # zizmor: ignore[unpinned-tools] Trivy action is SHA-pinned; the action installs a pinned Trivy tool version.
      - name: Block unexpected critical vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: sitbank:pr
          format: table
          exit-code: "1"
          ignore-unfixed: false
          severity: CRITICAL
          trivyignores: .trivyignore
          version: v0.72.0

      # zizmor: ignore[unpinned-tools] Trivy action is SHA-pinned; the action installs a pinned Trivy tool version.
      - name: Block fixable high and critical vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        env:
          TRIVY_IGNOREFILE: /dev/null
        with:
          image-ref: sitbank:pr
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          version: v0.72.0

  deployment-preflight:
    name: Deployment preflight
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      TARGET_ENVIRONMENT: ${{ inputs.target_environment || 'staging' }}
      DEPLOY_REQUESTED: ${{ inputs.deploy || false }}
      STAGING_DEPLOY_ENABLED: ${{ vars.STAGING_DEPLOY_ENABLED }}
      PROD_DEPLOY_ENABLED: ${{ vars.PROD_DEPLOY_ENABLED }}
    steps:
      - name: Validate release request
        shell: bash
        run: |
          case "${TARGET_ENVIRONMENT}" in
            staging) ;;
            *)
              echo "::error::Invalid target_environment '${TARGET_ENVIRONMENT}'."
              exit 1
              ;;
          esac

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "::error::Pull request events must never reach deployment preflight."
            exit 1
          fi

          if [[ "${DEPLOY_REQUESTED}" == "true" \
              && "${TARGET_ENVIRONMENT}" == "staging" \
              && "${STAGING_DEPLOY_ENABLED}" != "true" ]]; then
            echo "::notice::Staging deployment requested, but STAGING_DEPLOY_ENABLED is not true. The digest will be verified and deployment will be skipped."
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            if [[ "${STAGING_DEPLOY_ENABLED}" != "true" ]]; then
              echo "::notice::STAGING_DEPLOY_ENABLED is not true. Automatic staging deployment will be skipped."
            fi
            if [[ "${PROD_DEPLOY_ENABLED}" != "true" ]]; then
              echo "::notice::PROD_DEPLOY_ENABLED is not true. Automatic production deployment will be skipped."
            fi
          fi

  publish:
    name: Publish container image
    if: >-
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main' &&
      (
        github.event_name == 'push' ||
        (
          github.event_name == 'workflow_dispatch' &&
          inputs.target_environment == 'staging'
        )
      )
    needs:
      - test
      - playwright-e2e
      - sonarqube
      - workflow-security
      - deployment-preflight
      - resolve-source
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
      artifact-metadata: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      repository: ${{ steps.image.outputs.repository }}
      revision: ${{ needs.resolve-source.outputs.source_sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          ref: ${{ needs.resolve-source.outputs.source_sha }}

      - name: Resolve lowercase GHCR repository
        id: image
        shell: bash
        run: |
          repository="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "repository=${repository}" >> "${GITHUB_OUTPUT}"

      - name: Resolve immutable image tags
        id: tags
        shell: bash
        env:
          REPOSITORY: ${{ steps.image.outputs.repository }}
          TARGET_ENVIRONMENT: ${{ inputs.target_environment || 'staging' }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            {
              echo "tags<<EOF"
              printf '%s\n' "${REPOSITORY}:manual-${GITHUB_RUN_ID}"
              printf '%s\n' "${REPOSITORY}:${TARGET_ENVIRONMENT}-${GITHUB_RUN_ID}"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
          else
            echo "tags=${REPOSITORY}:${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push the release candidate once
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VCS_REF=${{ needs.resolve-source.outputs.source_sha }}
            SOURCE_URL=${{ github.server_url }}/${{ github.repository }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest the exact published image digest
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763
        with:
          subject-name: ${{ steps.image.outputs.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
          show-summary: false

  release-verify:
    name: Release verification
    if: >-
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main' &&
      (
        github.event_name == 'push' ||
        (
          github.event_name == 'workflow_dispatch' &&
          inputs.target_environment == 'staging'
        )
      )
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      attestations: read
      contents: read
      id-token: write
      packages: write
    outputs:
      digest: ${{ steps.image.outputs.digest }}
      repository: ${{ steps.image.outputs.repository }}
      image: ${{ steps.image.outputs.image }}
      revision: ${{ steps.image.outputs.revision }}
    steps:
      - name: Check out trusted workflow repository state
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          ref: ${{ github.workflow_sha }}

      - name: Check out candidate source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          ref: ${{ needs.publish.outputs.revision }}
          path: candidate-source

      - name: Resolve verified image reference
        id: image
        shell: bash
        env:
          IMAGE_DIGEST: ${{ needs.publish.outputs.digest }}
          IMAGE_REPOSITORY: ${{ needs.publish.outputs.repository }}
          RELEASE_SHA: ${{ needs.publish.outputs.revision }}
        run: |
          if [[ ! "${IMAGE_REPOSITORY}" =~ ^ghcr\.io/[a-z0-9._-]+/[a-z0-9._-]+$ ]]; then
            echo "::error::Publish emitted an invalid GHCR repository."
            exit 1
          fi
          if [[ ! "${IMAGE_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::Publish emitted an invalid image digest."
            exit 1
          fi
          image="${IMAGE_REPOSITORY}@${IMAGE_DIGEST}"
          {
            echo "repository=${IMAGE_REPOSITORY}"
            echo "digest=${IMAGE_DIGEST}"
            echo "image=${image}"
            echo "revision=${RELEASE_SHA}"
          } >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Pull and verify release identity
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          RELEASE_SHA: ${{ steps.image.outputs.revision }}
        run: |
          docker pull "${IMAGE}"
          revision="$(
            docker image inspect \
              --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' \
              "${IMAGE}"
          )"
          test "${revision}" = "${RELEASE_SHA}"

      - name: Verify signed SLSA provenance for the exact digest
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE: ${{ steps.image.outputs.image }}
          RELEASE_SHA: ${{ steps.image.outputs.revision }}
        run: |
          gh attestation verify "oci://${IMAGE}" \
            --repo "${GITHUB_REPOSITORY}" \
            --signer-workflow "github.com/${GITHUB_REPOSITORY}/.github/workflows/ci-deploy.yml" \
            --source-ref "refs/heads/main" \
            --source-digest "${RELEASE_SHA}" \
            --cert-oidc-issuer "https://token.actions.githubusercontent.com" \
            --deny-self-hosted-runners \
            >/dev/null

      - name: Validate production and staging Compose models for the exact digest
        env:
          SITBANK_IMAGE: ${{ steps.image.outputs.image }}
        run: bash candidate-source/ops/container/validate-compose.sh "${SITBANK_IMAGE}"

      - name: Smoke-test and DAST-scan the exact published digest
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          RUN_ZAP_DAST: ${{ github.event_name != 'workflow_dispatch' || inputs.run_dast == true }}
        run: bash candidate-source/ops/container/smoke-test.sh "${IMAGE}"

      # zizmor: ignore[unpinned-tools] Trivy action is SHA-pinned; the action installs a pinned Trivy tool version.
      - name: Report all critical vulnerabilities in the published digest
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        env:
          TRIVY_IGNOREFILE: /dev/null
        with:
          image-ref: ${{ steps.image.outputs.image }}
          format: table
          exit-code: "0"
          ignore-unfixed: false
          severity: CRITICAL
          version: v0.72.0

      # zizmor: ignore[unpinned-tools] Trivy action is SHA-pinned; the action installs a pinned Trivy tool version.
      - name: Block unexpected critical vulnerabilities in the published digest
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ steps.image.outputs.image }}
          format: table
          exit-code: "1"
          ignore-unfixed: false
          severity: CRITICAL
          trivyignores: .trivyignore
          version: v0.72.0

      # zizmor: ignore[unpinned-tools] Trivy action is SHA-pinned; the action installs a pinned Trivy tool version.
      - name: Block fixable high and critical vulnerabilities in the published digest
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        env:
          TRIVY_IGNOREFILE: /dev/null
        with:
          image-ref: ${{ steps.image.outputs.image }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          version: v0.72.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6

      - name: Sign and verify the tested immutable digest
        env:
          IMAGE: ${{ steps.image.outputs.image }}
        run: |
          cosign sign --yes "${IMAGE}"
          cosign verify \
            --certificate-identity "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/.github/workflows/ci-deploy.yml@${GITHUB_REF}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE}" >/dev/null

  deploy-staging:
    name: Deploy staging
    if: >-
      github.event_name != 'pull_request' &&
      needs.release-verify.result == 'success' &&
      (
        (
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          vars.STAGING_DEPLOY_ENABLED == 'true'
        ) ||
        (
          github.event_name == 'workflow_dispatch' &&
          github.ref == 'refs/heads/main' &&
          inputs.target_environment == 'staging' &&
          inputs.deploy == true &&
          vars.STAGING_DEPLOY_ENABLED == 'true'
        )
      )
    needs: release-verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      packages: read
    environment:
      name: staging
      url: https://${{ vars['STAGING_PUBLIC_HOST'] || 'staging-sitbank.pp.ua' }}
    env:
      RELEASE_SHA: ${{ needs.release-verify.outputs.revision }}
      IMAGE_DIGEST: ${{ needs.release-verify.outputs.digest }}
      REMOTE_HOST: ${{ vars.STAGING_EC2_HOST }}
      REMOTE_PORT: ${{ vars.STAGING_EC2_PORT }}
      REMOTE_USER: ${{ vars.STAGING_EC2_DEPLOY_USER }}
      STAGING_PUBLIC_HOST: ${{ vars['STAGING_PUBLIC_HOST'] || 'staging-sitbank.pp.ua' }}
      STAGING_MFA_KEK_ACTIVE_ID: ${{ vars.STAGING_MFA_KEK_ACTIVE_ID }}
      STAGING_TRANSACTION_LEDGER_HMAC_ACTIVE_KEY_ID: ${{ vars.STAGING_TRANSACTION_LEDGER_HMAC_ACTIVE_KEY_ID }}
      STAGING_SESSION_HMAC_ACTIVE_KEY_ID: ${{ vars.STAGING_SESSION_HMAC_ACTIVE_KEY_ID }}
      STAGING_ADMIN_SESSION_HMAC_ACTIVE_KEY_ID: ${{ vars.STAGING_ADMIN_SESSION_HMAC_ACTIVE_KEY_ID }}
      STAGING_PASSWORD_PBKDF2_ITERATIONS: ${{ vars.STAGING_PASSWORD_PBKDF2_ITERATIONS }}
      STAGING_MFA_ISSUER_NAME: ${{ vars.STAGING_MFA_ISSUER_NAME }}
      STAGING_PASSWORD_RESET_EMAIL_FROM: ${{ vars.STAGING_PASSWORD_RESET_EMAIL_FROM }}
      STAGING_ROOT_ADMIN_EMAILS: ${{ secrets.STAGING_ROOT_ADMIN_EMAILS }}
      STAGING_SMTP_HOST: ${{ vars.STAGING_SMTP_HOST }}
      STAGING_CLOUDFLARE_ACCESS_AUD: ${{ vars.STAGING_CLOUDFLARE_ACCESS_AUD }}
      STAGING_CLOUDFLARE_ACCESS_TEAM_DOMAIN: ${{ vars.STAGING_CLOUDFLARE_ACCESS_TEAM_DOMAIN }}
      STAGING_TURNSTILE_ENABLED: ${{ vars.STAGING_TURNSTILE_ENABLED }}
      STAGING_TURNSTILE_SITE_KEY: ${{ vars.STAGING_TURNSTILE_SITE_KEY }}
      STAGING_TURNSTILE_CUSTOMER_LOGIN_ENABLED: ${{ vars.STAGING_TURNSTILE_CUSTOMER_LOGIN_ENABLED }}
      STAGING_TURNSTILE_CUSTOMER_REGISTER_OTP_ENABLED: ${{ vars.STAGING_TURNSTILE_CUSTOMER_REGISTER_OTP_ENABLED }}
      STAGING_TURNSTILE_CUSTOMER_REGISTER_ENABLED: ${{ vars.STAGING_TURNSTILE_CUSTOMER_REGISTER_ENABLED }}
      STAGING_TURNSTILE_CUSTOMER_PASSWORD_RESET_ENABLED: ${{ vars.STAGING_TURNSTILE_CUSTOMER_PASSWORD_RESET_ENABLED }}
      STAGING_TURNSTILE_CUSTOMER_MANUAL_RECOVERY_ENABLED: ${{ vars.STAGING_TURNSTILE_CUSTOMER_MANUAL_RECOVERY_ENABLED }}
      STAGING_TURNSTILE_ADMIN_LOGIN_ENABLED: ${{ vars.STAGING_TURNSTILE_ADMIN_LOGIN_ENABLED }}
      STAGING_TURNSTILE_ADMIN_INVITE_ACCEPT_ENABLED: ${{ vars.STAGING_TURNSTILE_ADMIN_INVITE_ACCEPT_ENABLED }}
      STAGING_TURNSTILE_FAIL_CLOSED_IN_PRODUCTION: ${{ vars.STAGING_TURNSTILE_FAIL_CLOSED_IN_PRODUCTION }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          ref: ${{ github.workflow_sha }}

      - name: Verify staging deployment configuration
        env:
          STAGING_EC2_KNOWN_HOSTS: ${{ secrets.STAGING_EC2_KNOWN_HOSTS }}
          STAGING_EC2_SSH_PRIVATE_KEY_B64: ${{ secrets.STAGING_EC2_SSH_PRIVATE_KEY_B64 }}
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
        run: |
          required=(
            IMAGE_DIGEST
            REMOTE_HOST
            REMOTE_PORT
            REMOTE_USER
            STAGING_PUBLIC_HOST
            STAGING_MFA_KEK_ACTIVE_ID
            STAGING_TRANSACTION_LEDGER_HMAC_ACTIVE_KEY_ID
            STAGING_SESSION_HMAC_ACTIVE_KEY_ID
            STAGING_ADMIN_SESSION_HMAC_ACTIVE_KEY_ID
            STAGING_PASSWORD_PBKDF2_ITERATIONS
            STAGING_MFA_ISSUER_NAME
            STAGING_PASSWORD_RESET_EMAIL_FROM
            STAGING_ROOT_ADMIN_EMAILS
            STAGING_SMTP_HOST
            STAGING_CLOUDFLARE_ACCESS_AUD
            STAGING_CLOUDFLARE_ACCESS_TEAM_DOMAIN
            STAGING_TURNSTILE_ENABLED
            STAGING_TURNSTILE_SITE_KEY
            STAGING_TURNSTILE_CUSTOMER_LOGIN_ENABLED
            STAGING_TURNSTILE_CUSTOMER_REGISTER_OTP_ENABLED
            STAGING_TURNSTILE_CUSTOMER_REGISTER_ENABLED
            STAGING_TURNSTILE_CUSTOMER_PASSWORD_RESET_ENABLED
            STAGING_TURNSTILE_CUSTOMER_MANUAL_RECOVERY_ENABLED
            STAGING_TURNSTILE_ADMIN_LOGIN_ENABLED
            STAGING_TURNSTILE_ADMIN_INVITE_ACCEPT_ENABLED
            STAGING_TURNSTILE_FAIL_CLOSED_IN_PRODUCTION
            STAGING_EC2_KNOWN_HOSTS
            STAGING_EC2_SSH_PRIVATE_KEY_B64
            TS_OAUTH_CLIENT_ID
            TS_OAUTH_SECRET
          )
          missing=0
          for name in "${required[@]}"; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing required staging deployment setting: ${name}"
              missing=1
            fi
          done
          if [[ ! "${IMAGE_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::Verified image digest is invalid."
            missing=1
          fi
          if [[ ! "${REMOTE_PORT}" =~ ^[0-9]+$ ]]; then
            echo "::error::STAGING_EC2_PORT must be numeric."
            missing=1
          fi
          exit "${missing}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6

      - name: Render and sign staging runtime configuration
        run: |
          umask 077
          python ops/deploy/render_container_bundle.py \
            --prefix STAGING \
            --environment-only \
            --output-root "${GITHUB_WORKSPACE}" \
            --output "runtime-staging-${RELEASE_SHA}"
          tar --create --file "runtime-staging-${RELEASE_SHA}.tar" \
            --directory "runtime-staging-${RELEASE_SHA}" .
          sha256sum "runtime-staging-${RELEASE_SHA}.tar" \
            > "runtime-staging-${RELEASE_SHA}.sha256"
          cosign sign-blob --yes \
            --bundle "runtime-staging-${RELEASE_SHA}.sigstore.json" \
            "runtime-staging-${RELEASE_SHA}.tar"
          printf '%s\n%s\n' "${GITHUB_ACTOR}" "${GITHUB_TOKEN}" \
            > "registry-staging-${RELEASE_SHA}.credentials"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Join the staging deploy tailnet
        uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-ci-staging-deploy
          ping: ${{ vars.STAGING_EC2_HOST }}

      - name: Configure verified SSH
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.STAGING_EC2_SSH_PRIVATE_KEY_B64 }}
          SSH_KNOWN_HOSTS: ${{ secrets.STAGING_EC2_KNOWN_HOSTS }}
        run: |
          umask 077
          install -d -m 0700 ~/.ssh

          if [[ ! "${SSH_PRIVATE_KEY_B64}" =~ ^[A-Za-z0-9+/]+={0,2}$ ]]; then
            echo "::error::STAGING_EC2_SSH_PRIVATE_KEY_B64 is not valid single-line Base64."
            exit 1
          fi
          if ! printf '%s' "${SSH_PRIVATE_KEY_B64}" \
              | base64 --decode > ~/.ssh/deploy_key; then
            echo "::error::STAGING_EC2_SSH_PRIVATE_KEY_B64 could not be decoded."
            exit 1
          fi
          chmod 0600 ~/.ssh/deploy_key
          if ! ssh-keygen -y -P "" -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "::error::Decoded staging SSH key could not be parsed. Store Base64 of an unencrypted OpenSSH private key."
            exit 1
          fi

          printf '%s\n' "${SSH_KNOWN_HOSTS}" \
            | tr -d '\r' > ~/.ssh/known_hosts
          chmod 0600 ~/.ssh/known_hosts
          if [[ ! -s ~/.ssh/known_hosts ]]; then
            echo "::error::STAGING_EC2_KNOWN_HOSTS is empty."
            exit 1
          fi

      - name: Stage restricted staging Turnstile credential
        env:
          TURNSTILE_SECRET_KEY: ${{ secrets.STAGING_TURNSTILE_SECRET_KEY }}
        run: |
          umask 077
          if [[ ! "${TURNSTILE_SECRET_KEY}" =~ ^[A-Za-z0-9._-]{8,512}$ ]]; then
            echo "::error::STAGING_TURNSTILE_SECRET_KEY is missing or malformed."
            exit 1
          fi
          printf '%s' "${TURNSTILE_SECRET_KEY}" \
            > "turnstile-staging-${RELEASE_SHA}.secret"

      - name: Stage restricted staging root-admin allowlist
        run: |
          umask 077
          python - <<'PY'
          import os
          import re
          import sys

          value = os.environ.get("STAGING_ROOT_ADMIN_EMAILS", "")
          emails = [item.strip().casefold() for item in value.split(",") if item.strip()]
          if len(emails) != 2 or len(set(emails)) != 2:
              print("::error::STAGING_ROOT_ADMIN_EMAILS must contain exactly 2 unique workplace email addresses.", file=sys.stderr)
              raise SystemExit(1)
          for email in emails:
              if not re.fullmatch(r"(?=\S{1,128}@\S{1,253}$)[^@\x00-\x1f\x7f]+@[^@\x00-\x1f\x7f]+", email):
                  print("::error::STAGING_ROOT_ADMIN_EMAILS contains an invalid email address.", file=sys.stderr)
                  raise SystemExit(1)
              domain = email.rsplit("@", 1)[1]
              if domain not in {"sit.singaporetech.edu.sg", "singaporetech.edu.sg"}:
                  print("::error::STAGING_ROOT_ADMIN_EMAILS must contain only SIT workplace email addresses.", file=sys.stderr)
                  raise SystemExit(1)
          PY
          printf '%s' "${STAGING_ROOT_ADMIN_EMAILS}" \
            > "root-admin-emails-staging-${RELEASE_SHA}.secret"

      - name: Verify trusted staging deployment files
        run: |
          expected_wrapper_hash="$(
            sha256sum ops/deploy/sitbank-container-deploy | awk '{print $1}'
          )"
          expected_compose_hash="$(
            sha256sum compose.staging.yml | awk '{print $1}'
          )"
          if ! remote_output="$(
              ssh -p "${REMOTE_PORT}" -i ~/.ssh/deploy_key \
              -o BatchMode=yes -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=yes -o ConnectTimeout=15 \
              "${REMOTE_USER}@${REMOTE_HOST}" \
              "sha256sum /usr/local/sbin/sitbank-container-deploy /opt/sitbank-staging/compose.yml"
            )"; then
            echo "::error::The EC2 staging deployment files are unavailable. Rerun the trusted staging bootstrap before deployment."
            exit 1
          fi
          remote_wrapper_hash="$(
            printf '%s\n' "${remote_output}" \
              | awk '$2 == "/usr/local/sbin/sitbank-container-deploy" { print $1 }'
          )"
          remote_compose_hash="$(
            printf '%s\n' "${remote_output}" \
              | awk '$2 == "/opt/sitbank-staging/compose.yml" { print $1 }'
          )"
          if [[ ! "${remote_wrapper_hash}" =~ ^[0-9a-f]{64}$ \
              || "${remote_wrapper_hash}" != "${expected_wrapper_hash}" ]]; then
            echo "::error::The EC2 staging deployment wrapper is missing or stale. Rerun the trusted staging bootstrap before deployment."
            exit 1
          fi
          if [[ ! "${remote_compose_hash}" =~ ^[0-9a-f]{64}$ \
              || "${remote_compose_hash}" != "${expected_compose_hash}" ]]; then
            echo "::error::The EC2 staging compose file is missing or stale. Rerun the trusted staging bootstrap before deployment."
            exit 1
          fi

      - name: Upload authenticated deployment inputs
        run: |
          scp -P "${REMOTE_PORT}" -i ~/.ssh/deploy_key \
            -o BatchMode=yes -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes -o ConnectTimeout=15 \
            "runtime-staging-${RELEASE_SHA}.tar" \
            "runtime-staging-${RELEASE_SHA}.sha256" \
            "runtime-staging-${RELEASE_SHA}.sigstore.json" \
            "registry-staging-${RELEASE_SHA}.credentials" \
            "turnstile-staging-${RELEASE_SHA}.secret" \
            "root-admin-emails-staging-${RELEASE_SHA}.secret" \
            "${REMOTE_USER}@${REMOTE_HOST}:incoming/"

      - name: Deploy verified image digest
        run: |
          ssh -p "${REMOTE_PORT}" -i ~/.ssh/deploy_key \
            -o BatchMode=yes -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes -o ConnectTimeout=15 \
            "${REMOTE_USER}@${REMOTE_HOST}" \
            "sudo /usr/local/sbin/sitbank-container-deploy staging '${RELEASE_SHA}' '${IMAGE_DIGEST}'"

      - name: Remove deployment credentials and bundles
        if: always()
        run: |
          rm -rf ~/.ssh/deploy_key \
            "runtime-staging-${RELEASE_SHA}" \
            "runtime-staging-${RELEASE_SHA}.tar" \
            "runtime-staging-${RELEASE_SHA}.sha256" \
            "runtime-staging-${RELEASE_SHA}.sigstore.json" \
            "registry-staging-${RELEASE_SHA}.credentials" \
            "turnstile-staging-${RELEASE_SHA}.secret" \
            "root-admin-emails-staging-${RELEASE_SHA}.secret"

      - name: Disconnect staging deploy tailnet
        if: ${{ always() }}
        run: |
          sudo tailscale logout > /dev/null 2>&1 || true

  verify-staging-tls:
    name: Verify staging TLS
    if: >-
      always() &&
      needs.deploy-staging.result == 'success'
    needs: deploy-staging
    uses: ./.github/workflows/tls-scan.yml
    with:
      scan_scope: staging
      staging_host: ${{ vars['STAGING_PUBLIC_HOST'] || 'staging-sitbank.pp.ua' }}

  deploy-production:
    name: Deploy production
    if: >-
      always() &&
      needs.release-verify.result == 'success' &&
      needs.deploy-staging.result == 'success' &&
      needs.verify-staging-tls.result == 'success' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.PROD_DEPLOY_ENABLED == 'true'
    needs:
      - release-verify
      - deploy-staging
      - verify-staging-tls
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      packages: read
    environment:
      name: production
      url: https://${{ vars['PROD_PUBLIC_HOST'] || 'sitbank.pp.ua' }}
    env:
      RELEASE_SHA: ${{ needs.release-verify.outputs.revision }}
      IMAGE_DIGEST: ${{ needs.release-verify.outputs.digest }}
      REMOTE_HOST: ${{ vars.PROD_EC2_HOST }}
      REMOTE_PORT: ${{ vars.PROD_EC2_PORT }}
      REMOTE_USER: ${{ vars.PROD_EC2_DEPLOY_USER }}
      PROD_PUBLIC_HOST: ${{ vars['PROD_PUBLIC_HOST'] || 'sitbank.pp.ua' }}
      PROD_MFA_KEK_ACTIVE_ID: ${{ vars.PROD_MFA_KEK_ACTIVE_ID }}
      PROD_TRANSACTION_LEDGER_HMAC_ACTIVE_KEY_ID: ${{ vars.PROD_TRANSACTION_LEDGER_HMAC_ACTIVE_KEY_ID }}
      PROD_SESSION_HMAC_ACTIVE_KEY_ID: ${{ vars.PROD_SESSION_HMAC_ACTIVE_KEY_ID }}
      PROD_ADMIN_SESSION_HMAC_ACTIVE_KEY_ID: ${{ vars.PROD_ADMIN_SESSION_HMAC_ACTIVE_KEY_ID }}
      PROD_PASSWORD_PBKDF2_ITERATIONS: ${{ vars.PROD_PASSWORD_PBKDF2_ITERATIONS }}
      PROD_MFA_ISSUER_NAME: ${{ vars.PROD_MFA_ISSUER_NAME }}
      PROD_PASSWORD_RESET_EMAIL_FROM: ${{ vars.PROD_PASSWORD_RESET_EMAIL_FROM }}
      PROD_ROOT_ADMIN_EMAILS: ${{ secrets.PROD_ROOT_ADMIN_EMAILS }}
      PROD_SMTP_HOST: ${{ vars.PROD_SMTP_HOST }}
      PROD_TURNSTILE_ENABLED: ${{ vars.PROD_TURNSTILE_ENABLED }}
      PROD_TURNSTILE_SITE_KEY: ${{ vars.PROD_TURNSTILE_SITE_KEY }}
      PROD_TURNSTILE_CUSTOMER_LOGIN_ENABLED: ${{ vars.PROD_TURNSTILE_CUSTOMER_LOGIN_ENABLED }}
      PROD_TURNSTILE_CUSTOMER_REGISTER_OTP_ENABLED: ${{ vars.PROD_TURNSTILE_CUSTOMER_REGISTER_OTP_ENABLED }}
      PROD_TURNSTILE_CUSTOMER_REGISTER_ENABLED: ${{ vars.PROD_TURNSTILE_CUSTOMER_REGISTER_ENABLED }}
      PROD_TURNSTILE_CUSTOMER_PASSWORD_RESET_ENABLED: ${{ vars.PROD_TURNSTILE_CUSTOMER_PASSWORD_RESET_ENABLED }}
      PROD_TURNSTILE_CUSTOMER_MANUAL_RECOVERY_ENABLED: ${{ vars.PROD_TURNSTILE_CUSTOMER_MANUAL_RECOVERY_ENABLED }}
      PROD_TURNSTILE_ADMIN_LOGIN_ENABLED: ${{ vars.PROD_TURNSTILE_ADMIN_LOGIN_ENABLED }}
      PROD_TURNSTILE_ADMIN_INVITE_ACCEPT_ENABLED: ${{ vars.PROD_TURNSTILE_ADMIN_INVITE_ACCEPT_ENABLED }}
      PROD_TURNSTILE_FAIL_CLOSED_IN_PRODUCTION: ${{ vars.PROD_TURNSTILE_FAIL_CLOSED_IN_PRODUCTION }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          ref: ${{ github.workflow_sha }}

      - name: Verify production deployment configuration
        env:
          PROD_EC2_KNOWN_HOSTS: ${{ secrets.PROD_EC2_KNOWN_HOSTS }}
          PROD_EC2_SSH_PRIVATE_KEY_B64: ${{ secrets.PROD_EC2_SSH_PRIVATE_KEY_B64 }}
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
        run: |
          required=(
            IMAGE_DIGEST
            REMOTE_HOST
            REMOTE_PORT
            REMOTE_USER
            PROD_PUBLIC_HOST
            PROD_MFA_KEK_ACTIVE_ID
            PROD_TRANSACTION_LEDGER_HMAC_ACTIVE_KEY_ID
            PROD_SESSION_HMAC_ACTIVE_KEY_ID
            PROD_ADMIN_SESSION_HMAC_ACTIVE_KEY_ID
            PROD_PASSWORD_PBKDF2_ITERATIONS
            PROD_MFA_ISSUER_NAME
            PROD_PASSWORD_RESET_EMAIL_FROM
            PROD_ROOT_ADMIN_EMAILS
            PROD_SMTP_HOST
            PROD_TURNSTILE_ENABLED
            PROD_TURNSTILE_SITE_KEY
            PROD_TURNSTILE_CUSTOMER_LOGIN_ENABLED
            PROD_TURNSTILE_CUSTOMER_REGISTER_OTP_ENABLED
            PROD_TURNSTILE_CUSTOMER_REGISTER_ENABLED
            PROD_TURNSTILE_CUSTOMER_PASSWORD_RESET_ENABLED
            PROD_TURNSTILE_CUSTOMER_MANUAL_RECOVERY_ENABLED
            PROD_TURNSTILE_ADMIN_LOGIN_ENABLED
            PROD_TURNSTILE_ADMIN_INVITE_ACCEPT_ENABLED
            PROD_TURNSTILE_FAIL_CLOSED_IN_PRODUCTION
            PROD_EC2_KNOWN_HOSTS
            PROD_EC2_SSH_PRIVATE_KEY_B64
            TS_OAUTH_CLIENT_ID
            TS_OAUTH_SECRET
          )
          missing=0
          for name in "${required[@]}"; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing required production deployment setting: ${name}"
              missing=1
            fi
          done
          if [[ ! "${IMAGE_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::Verified image digest is invalid."
            missing=1
          fi
          if [[ ! "${REMOTE_PORT}" =~ ^[0-9]+$ ]]; then
            echo "::error::PROD_EC2_PORT must be numeric."
            missing=1
          fi
          exit "${missing}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6

      - name: Render and sign production runtime configuration
        run: |
          umask 077
          python ops/deploy/render_container_bundle.py \
            --prefix PROD \
            --environment-only \
            --output-root "${GITHUB_WORKSPACE}" \
            --output "runtime-${RELEASE_SHA}"
          tar --create --file "runtime-${RELEASE_SHA}.tar" \
            --directory "runtime-${RELEASE_SHA}" .
          sha256sum "runtime-${RELEASE_SHA}.tar" \
            > "runtime-${RELEASE_SHA}.sha256"
          cosign sign-blob --yes \
            --bundle "runtime-${RELEASE_SHA}.sigstore.json" \
            "runtime-${RELEASE_SHA}.tar"
          printf '%s\n%s\n' "${GITHUB_ACTOR}" "${GITHUB_TOKEN}" \
            > "registry-${RELEASE_SHA}.credentials"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Join the production deploy tailnet
        uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-ci-prod-deploy
          ping: ${{ vars.PROD_EC2_HOST }}

      - name: Configure verified SSH
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.PROD_EC2_SSH_PRIVATE_KEY_B64 }}
          SSH_KNOWN_HOSTS: ${{ secrets.PROD_EC2_KNOWN_HOSTS }}
        run: |
          umask 077
          install -d -m 0700 ~/.ssh

          if [[ ! "${SSH_PRIVATE_KEY_B64}" =~ ^[A-Za-z0-9+/]+={0,2}$ ]]; then
            echo "::error::PROD_EC2_SSH_PRIVATE_KEY_B64 is not valid single-line Base64."
            exit 1
          fi
          if ! printf '%s' "${SSH_PRIVATE_KEY_B64}" \
              | base64 --decode > ~/.ssh/deploy_key; then
            echo "::error::PROD_EC2_SSH_PRIVATE_KEY_B64 could not be decoded."
            exit 1
          fi
          chmod 0600 ~/.ssh/deploy_key
          if ! ssh-keygen -y -P "" -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "::error::Decoded production SSH key could not be parsed. Store Base64 of an unencrypted OpenSSH private key."
            exit 1
          fi

          printf '%s\n' "${SSH_KNOWN_HOSTS}" \
            | tr -d '\r' > ~/.ssh/known_hosts
          chmod 0600 ~/.ssh/known_hosts
          if [[ ! -s ~/.ssh/known_hosts ]]; then
            echo "::error::PROD_EC2_KNOWN_HOSTS is empty."
            exit 1
          fi

      - name: Stage restricted production Turnstile credential
        env:
          TURNSTILE_SECRET_KEY: ${{ secrets.PROD_TURNSTILE_SECRET_KEY }}
        run: |
          umask 077
          if [[ ! "${TURNSTILE_SECRET_KEY}" =~ ^[A-Za-z0-9._-]{8,512}$ ]]; then
            echo "::error::PROD_TURNSTILE_SECRET_KEY is missing or malformed."
            exit 1
          fi
          printf '%s' "${TURNSTILE_SECRET_KEY}" \
            > "turnstile-${RELEASE_SHA}.secret"

      - name: Stage restricted production root-admin allowlist
        run: |
          umask 077
          python - <<'PY'
          import os
          import re
          import sys

          value = os.environ.get("PROD_ROOT_ADMIN_EMAILS", "")
          emails = [item.strip().casefold() for item in value.split(",") if item.strip()]
          if len(emails) != 5 or len(set(emails)) != 5:
              print("::error::PROD_ROOT_ADMIN_EMAILS must contain exactly 5 unique workplace email addresses.", file=sys.stderr)
              raise SystemExit(1)
          for email in emails:
              if not re.fullmatch(r"(?=\S{1,128}@\S{1,253}$)[^@\x00-\x1f\x7f]+@[^@\x00-\x1f\x7f]+", email):
                  print("::error::PROD_ROOT_ADMIN_EMAILS contains an invalid email address.", file=sys.stderr)
                  raise SystemExit(1)
              domain = email.rsplit("@", 1)[1]
              if domain not in {"sit.singaporetech.edu.sg", "singaporetech.edu.sg"}:
                  print("::error::PROD_ROOT_ADMIN_EMAILS must contain only SIT workplace email addresses.", file=sys.stderr)
                  raise SystemExit(1)
          PY
          printf '%s' "${PROD_ROOT_ADMIN_EMAILS}" \
            > "root-admin-emails-${RELEASE_SHA}.secret"

      - name: Verify trusted production deployment files
        run: |
          expected_wrapper_hash="$(
            sha256sum ops/deploy/sitbank-container-deploy | awk '{print $1}'
          )"
          expected_compose_hash="$(
            sha256sum compose.prod.yml | awk '{print $1}'
          )"
          if ! remote_output="$(
              ssh -p "${REMOTE_PORT}" -i ~/.ssh/deploy_key \
              -o BatchMode=yes -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=yes -o ConnectTimeout=15 \
              "${REMOTE_USER}@${REMOTE_HOST}" \
              "sha256sum /usr/local/sbin/sitbank-container-deploy /opt/sitbank/compose.yml"
            )"; then
            echo "::error::The EC2 production deployment files are unavailable. Rerun the trusted production bootstrap before deployment."
            exit 1
          fi
          remote_wrapper_hash="$(
            printf '%s\n' "${remote_output}" \
              | awk '$2 == "/usr/local/sbin/sitbank-container-deploy" { print $1 }'
          )"
          remote_compose_hash="$(
            printf '%s\n' "${remote_output}" \
              | awk '$2 == "/opt/sitbank/compose.yml" { print $1 }'
          )"
          if [[ ! "${remote_wrapper_hash}" =~ ^[0-9a-f]{64}$ \
              || "${remote_wrapper_hash}" != "${expected_wrapper_hash}" ]]; then
            echo "::error::The EC2 production deployment wrapper is missing or stale. Rerun the trusted production bootstrap before deployment."
            exit 1
          fi
          if [[ ! "${remote_compose_hash}" =~ ^[0-9a-f]{64}$ \
              || "${remote_compose_hash}" != "${expected_compose_hash}" ]]; then
            echo "::error::The EC2 production compose file is missing or stale. Rerun the trusted production bootstrap before deployment."
            exit 1
          fi

      - name: Upload authenticated deployment inputs
        run: |
          scp -P "${REMOTE_PORT}" -i ~/.ssh/deploy_key \
            -o BatchMode=yes -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes -o ConnectTimeout=15 \
            "runtime-${RELEASE_SHA}.tar" \
            "runtime-${RELEASE_SHA}.sha256" \
            "runtime-${RELEASE_SHA}.sigstore.json" \
            "registry-${RELEASE_SHA}.credentials" \
            "turnstile-${RELEASE_SHA}.secret" \
            "root-admin-emails-${RELEASE_SHA}.secret" \
            "${REMOTE_USER}@${REMOTE_HOST}:incoming/"

      - name: Deploy verified image digest
        run: |
          ssh -p "${REMOTE_PORT}" -i ~/.ssh/deploy_key \
            -o BatchMode=yes -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes -o ConnectTimeout=15 \
            "${REMOTE_USER}@${REMOTE_HOST}" \
            "sudo /usr/local/sbin/sitbank-container-deploy '${RELEASE_SHA}' '${IMAGE_DIGEST}'"

      - name: Remove deployment credentials and bundles
        if: always()
        run: |
          rm -rf ~/.ssh/deploy_key \
            "runtime-${RELEASE_SHA}" \
            "runtime-${RELEASE_SHA}.tar" \
            "runtime-${RELEASE_SHA}.sha256" \
            "runtime-${RELEASE_SHA}.sigstore.json" \
            "registry-${RELEASE_SHA}.credentials" \
            "turnstile-${RELEASE_SHA}.secret" \
            "root-admin-emails-${RELEASE_SHA}.secret"

      - name: Disconnect production deploy tailnet
        if: ${{ always() }}
        run: |
          sudo tailscale logout > /dev/null 2>&1 || true

  verify-production-tls:
    name: Verify production TLS
    if: >-
      always() &&
      needs.deploy-production.result == 'success'
    needs: deploy-production
    uses: ./.github/workflows/tls-scan.yml
    with:
      scan_scope: production
      production_host: ${{ vars['PROD_PUBLIC_HOST'] || 'sitbank.pp.ua' }}

  verify-private-admin-tailnet:
    name: Verify private admin tailnet
    if: >-
      always() &&
      needs.deploy-production.result == 'success' &&
      needs.verify-production-tls.result == 'success'
    needs:
      - deploy-production
      - verify-production-tls
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    environment:
      name: admin-tailscale
    env:
      TAILSCALE_PRIVATE_ADMIN_HOST: ${{ vars.TAILSCALE_PRIVATE_ADMIN_HOST }}

    steps:
      - name: Validate private target and OAuth credential
        shell: bash
        env:
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
        run: |
          set -euo pipefail

          if [[ ! "${TAILSCALE_PRIVATE_ADMIN_HOST}" =~ ^[A-Za-z0-9]([A-Za-z0-9.-]{0,251}[A-Za-z0-9])?$ ]]; then
            echo "::error::The admin verification target must be a hostname, not a URL or command fragment."
            exit 1
          fi
          normalized_private_host="${TAILSCALE_PRIVATE_ADMIN_HOST,,}"
          if [[ "${normalized_private_host}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]] \
            || [[ ! "${normalized_private_host}" =~ \.ts\.net$ ]] \
            || [[ "${normalized_private_host}" == "sitbank.pp.ua" ]] \
            || [[ "${normalized_private_host}" == "www.sitbank.pp.ua" ]] \
            || [[ "${normalized_private_host}" == "staging-sitbank.pp.ua" ]]; then
            echo "::error::TAILSCALE_PRIVATE_ADMIN_HOST must be a private Tailscale DNS hostname from the protected admin-tailscale environment."
            exit 1
          fi
          if [[ -z "${TS_OAUTH_CLIENT_ID}" || -z "${TS_OAUTH_SECRET}" ]]; then
            echo "::error::The production gate requires TS_OAUTH_CLIENT_ID and TS_OAUTH_SECRET in the protected admin-tailscale environment."
            exit 1
          fi

          readonly private_admin_url="https://${TAILSCALE_PRIVATE_ADMIN_HOST}"
          if curl --silent --request GET --max-time 8 \
            --output /dev/null "${private_admin_url}/login"; then
            echo "::error::Private admin responded before the protected runner joined the tailnet."
            exit 1
          fi

      - name: Join the approved tailnet with OAuth
        uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-ci-admin-verify
          ping: ${{ env.TAILSCALE_PRIVATE_ADMIN_HOST }}

      - name: Verify private admin entrypoint
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$(tailscale status --json | jq -r '.BackendState')" != "Running" ]]; then
            echo "::error::The protected runner did not establish a running tailnet session."
            exit 1
          fi
          if ! getent ahostsv4 "${TAILSCALE_PRIVATE_ADMIN_HOST}" > /dev/null; then
            echo "::error::Private admin hostname did not resolve inside the tailnet."
            exit 1
          fi

          private_status="$(
            curl --silent --show-error --request GET --max-time 15 \
              --output /dev/null --write-out '%{http_code}' \
              "https://${TAILSCALE_PRIVATE_ADMIN_HOST}/login"
          )"
          if [[ "${private_status}" != "200" ]]; then
            echo "::error::Private admin login entrypoint returned HTTP ${private_status}; expected 200."
            exit 1
          fi

          {
            echo "## Private admin tailnet verification"
            echo
            echo "- Protected runner joined the approved tailnet."
            echo "- Private admin HTTPS login entrypoint returned the documented unauthenticated response."
            echo "- Required private admin gate passed."
            echo "- No admin credentials, cookies, deployment, Serve, or Funnel operations were used."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Disconnect ephemeral tailnet session
        if: ${{ always() }}
        shell: bash
        run: |
          sudo tailscale logout > /dev/null 2>&1 || true
