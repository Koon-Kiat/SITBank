name: CI and deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      APP_ENV: testing
      SECRET_KEY: ci-secret-key-that-is-long-enough-for-tests
      WTF_CSRF_SECRET_KEY: ci-csrf-key-that-is-long-enough-for-tests
      SESSION_HMAC_ACTIVE_KEY_ID: ci-current
      SESSION_HMAC_KEYS_JSON: '{"ci-current":"MjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjI=","ci-previous":"MzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzM="}'
      DATABASE_URL: postgresql+psycopg2://ci:ci@127.0.0.1:5432/ci
      REDIS_URL: redis://:ci@127.0.0.1:6379/15
      MFA_AES256_GCM_KEY_B64: MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=
      PASSWORD_PEPPER_B64: MTExMTExMTExMTExMTExMTExMTExMTExMTExMTExMTE=
      PASSWORD_PBKDF2_ITERATIONS: "600000"
      COMMON_PASSWORDS_PATH: tests/fixtures/common_passwords.txt
      COMMON_PASSWORDS_MIN_ENTRIES: "100000"
      WEBAUTHN_RP_ID: sitbank.duckdns.org
      WEBAUTHN_RP_ORIGIN: https://sitbank.duckdns.org
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock

      - name: Install locked dependencies
        run: python -m pip install --require-hashes -r requirements-dev.lock

      - name: Run tests
        run: python -m pytest -q

      - name: Compile application
        run: python -m compileall app config.py wsgi.py

      - name: Validate installed packages
        run: python -m pip check

      - name: Run static security scan
        run: python -m bandit -q -ll -r app config.py wsgi.py

      - name: Audit locked dependencies
        run: python -m pip_audit --require-hashes -r requirements.lock

  package:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Build immutable release archive
        run: |
          tar \
            --exclude=.git \
            --exclude=.venv \
            --exclude=venv \
            --exclude=.env \
            --exclude=__pycache__ \
            --exclude=.pytest_cache \
            --exclude='*.pyc' \
            --exclude='*.tar.gz' \
            -czf "scamcentre-${GITHUB_SHA}.tar.gz" .
          sha256sum "scamcentre-${GITHUB_SHA}.tar.gz" > "scamcentre-${GITHUB_SHA}.sha256"

      - name: Upload release artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: scamcentre-${{ github.sha }}
          path: |
            scamcentre-${{ github.sha }}.tar.gz
            scamcentre-${{ github.sha }}.sha256
          if-no-files-found: error
          retention-days: 7

  deploy:
    if: >-
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main' &&
      vars.PROD_DEPLOY_ENABLED == 'true'
    needs: package
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ vars.PROD_PUBLIC_HOST }}
    env:
      RELEASE_SHA: ${{ github.sha }}
      EC2_HOST: ${{ vars.EC2_HOST }}
      EC2_PORT: ${{ vars.EC2_PORT || '22' }}
      EC2_DEPLOY_USER: ${{ vars.EC2_DEPLOY_USER || 'scamcentre-deploy' }}
      PROD_PUBLIC_HOST: ${{ vars.PROD_PUBLIC_HOST }}
      SESSION_HMAC_ACTIVE_KEY_ID: ${{ vars.PROD_SESSION_HMAC_ACTIVE_KEY_ID }}
      SESSION_HMAC_PREVIOUS_KEY_ID: ${{ vars.PROD_SESSION_HMAC_PREVIOUS_KEY_ID }}
      COMMON_PASSWORDS_PATH: ${{ vars.PROD_COMMON_PASSWORDS_PATH || '/etc/scamcentre/common-passwords.txt' }}
      WEBAUTHN_APPROVED_AAGUIDS_PATH: ${{ vars.PROD_WEBAUTHN_APPROVED_AAGUIDS_PATH || '/etc/scamcentre/fido-approved-aaguids.json' }}
      WEBAUTHN_MDS_CACHE_PATH: ${{ vars.PROD_WEBAUTHN_MDS_CACHE_PATH || '/etc/scamcentre/fido-mds-cache.json' }}
      PASSWORD_PBKDF2_ITERATIONS: ${{ vars.PROD_PASSWORD_PBKDF2_ITERATIONS || '600000' }}
      MFA_ISSUER_NAME: ${{ vars.PROD_MFA_ISSUER_NAME || 'O$P$ Bank' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Download release artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: scamcentre-${{ github.sha }}

      - name: Render protected runtime environment
        env:
          SECRET_KEY: ${{ secrets.PROD_SECRET_KEY }}
          WTF_CSRF_SECRET_KEY: ${{ secrets.PROD_WTF_CSRF_SECRET_KEY }}
          SESSION_HMAC_ACTIVE_KEY_B64: ${{ secrets.PROD_SESSION_HMAC_ACTIVE_KEY_B64 }}
          SESSION_HMAC_PREVIOUS_KEY_B64: ${{ secrets.PROD_SESSION_HMAC_PREVIOUS_KEY_B64 }}
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          REDIS_URL: ${{ secrets.PROD_REDIS_URL }}
          MFA_AES256_GCM_KEY_B64: ${{ secrets.PROD_MFA_AES256_GCM_KEY_B64 }}
          PASSWORD_PEPPER_B64: ${{ secrets.PROD_PASSWORD_PEPPER_B64 }}
        run: |
          umask 077
          python ops/deploy/render_runtime_env.py > "runtime-${RELEASE_SHA}.env"

      - name: Configure SSH
        env:
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EC2_KNOWN_HOSTS: ${{ secrets.EC2_KNOWN_HOSTS }}
        run: |
          install -d -m 0700 ~/.ssh
          printf '%s\n' "${EC2_SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 0600 ~/.ssh/id_ed25519
          printf '%s\n' "${EC2_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 0600 ~/.ssh/known_hosts

      - name: Upload release
        run: |
          trap 'rm -f "runtime-${RELEASE_SHA}.env"' EXIT
          scp -P "${EC2_PORT}" -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes -o IdentitiesOnly=yes -o ConnectTimeout=15 \
            "scamcentre-${RELEASE_SHA}.tar.gz" \
            "scamcentre-${RELEASE_SHA}.sha256" \
            "runtime-${RELEASE_SHA}.env" \
            "${EC2_DEPLOY_USER}@${EC2_HOST}:incoming/"
          rm -f "runtime-${RELEASE_SHA}.env"

      - name: Deploy release
        run: |
          ssh -p "${EC2_PORT}" -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes -o IdentitiesOnly=yes -o ConnectTimeout=15 \
            "${EC2_DEPLOY_USER}@${EC2_HOST}" \
            "sudo /usr/local/sbin/scamcentre-deploy '${RELEASE_SHA}' '${PROD_PUBLIC_HOST}'"

      - name: Remove deployment credentials
        if: always()
        run: rm -f ~/.ssh/id_ed25519 "runtime-${RELEASE_SHA}.env"
