name: Issue labeler

on:
  issues:
    types:
      - opened
      - reopened
      - edited

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  label:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      # The policy is loaded only from the trusted default branch. Issue text is
      # data passed to the policy; it is never executed.
      - name: Check out trusted label policy
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}

      - name: Ensure standard labels exist
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -Eeuo pipefail
          definitions_file="${RUNNER_TEMP}/label-definitions.tsv"
          python ops/security/github_label_policy.py definitions > "${definitions_file}"
          while IFS=$'\t' read -r label description color; do
            gh label create "${label}" \
              --description "${description}" \
              --color "${color}" \
              --force
          done < "${definitions_file}"

      - name: Add bounded issue labels
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -Eeuo pipefail
          issue_number="$(jq -r '.issue.number' "${GITHUB_EVENT_PATH}")"
          labels_file="${RUNNER_TEMP}/computed-labels.txt"
          python ops/security/github_label_policy.py compute \
            --kind issue \
            --input "${GITHUB_EVENT_PATH}" \
            > "${labels_file}"
          mapfile -t labels < "${labels_file}"
          if (( ${#labels[@]} == 0 )); then
            exit 0
          fi
          IFS=,
          gh issue edit "${issue_number}" --add-label "${labels[*]}"
