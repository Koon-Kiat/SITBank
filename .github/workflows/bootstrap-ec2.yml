name: Bootstrap EC2 from trusted main

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: EC2 environment whose root-owned deployment files should be refreshed.
        required: true
        type: choice
        options:
          - staging
          - production

permissions: {}

concurrency:
  group: bootstrap-ec2-${{ inputs.target_environment }}
  cancel-in-progress: false

jobs:
  validate-request:
    name: Validate bootstrap request
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Require a trusted main dispatch
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "::error::EC2 bootstrap must be dispatched with 'Use workflow from' set to main."
            exit 1
          fi
          if [[ ! "${GITHUB_WORKFLOW_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::GitHub did not provide a valid trusted workflow commit."
            exit 1
          fi

  bootstrap-staging:
    name: Bootstrap staging EC2
    if: inputs.target_environment == 'staging'
    needs: validate-request
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    environment:
      name: staging
      url: https://${{ vars.STAGING_PUBLIC_HOST }}
    env:
      TARGET: staging
      TRUSTED_SHA: ${{ github.workflow_sha }}
      REMOTE_HOST: ${{ vars.STAGING_EC2_HOST }}
      REMOTE_PORT: ${{ vars.STAGING_EC2_PORT }}
      REMOTE_USER: ${{ vars.STAGING_EC2_DEPLOY_USER }}
    steps:
      - name: Check out trusted main workflow commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.workflow_sha }}

      - name: Verify Cloudflare boundary before staging bootstrap
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
          STAGING_ACCESS_HOSTNAME: ${{ vars.STAGING_PUBLIC_HOST }}
          STAGING_ACCESS_APP_NAME: ${{ vars.STAGING_ACCESS_APP_NAME }}
          STAGING_ACCESS_POLICY_NAME: ${{ vars.STAGING_ACCESS_POLICY_NAME }}
          STAGING_CLOUDFLARE_ACCESS_TEAM_DOMAIN: ${{ vars.STAGING_CLOUDFLARE_ACCESS_TEAM_DOMAIN }}
          STAGING_CLOUDFLARE_ACCESS_AUD: ${{ vars.STAGING_CLOUDFLARE_ACCESS_AUD }}
          STAGING_ACCESS_SESSION_DURATION: ${{ vars.STAGING_ACCESS_SESSION_DURATION }}
          STAGING_ACCESS_ALLOWED_EMAILS: ${{ secrets.STAGING_ACCESS_ALLOWED_EMAILS }}
          STAGING_ACCESS_ALLOWED_GROUP_IDS: ${{ secrets.STAGING_ACCESS_ALLOWED_GROUP_IDS }}
          STAGING_ACCESS_ALLOWED_IDP_IDS: ${{ vars.STAGING_ACCESS_ALLOWED_IDP_IDS }}
          STAGING_DNS_ORIGIN: ${{ secrets.STAGING_DNS_ORIGIN }}
          STAGING_ORIGIN_IP: ${{ secrets.STAGING_ORIGIN_IP }}
        run: python ops/cloudflare/provision-staging-access --verify

      - name: Verify staging bootstrap configuration
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.STAGING_EC2_SSH_PRIVATE_KEY_B64 }}
          SSH_KNOWN_HOSTS: ${{ secrets.STAGING_EC2_KNOWN_HOSTS }}
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
        shell: bash
        run: |
          required=(
            REMOTE_HOST
            REMOTE_PORT
            REMOTE_USER
            SSH_PRIVATE_KEY_B64
            SSH_KNOWN_HOSTS
            TS_OAUTH_CLIENT_ID
            TS_OAUTH_SECRET
          )
          missing=0
          for name in "${required[@]}"; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing required staging bootstrap setting: ${name}"
              missing=1
            fi
          done
          if [[ ! "${REMOTE_PORT}" =~ ^[0-9]+$ ]]; then
            echo "::error::STAGING_EC2_PORT must be numeric."
            missing=1
          fi
          exit "${missing}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6

      - name: Create and sign trusted main bootstrap archive
        shell: bash
        run: |
          umask 077
          archive="bootstrap-${TARGET}-${TRUSTED_SHA}.tar.gz"
          git archive \
            --format=tar.gz \
            --add-virtual-file=".sitbank-bootstrap-commit:${TRUSTED_SHA}" \
            --output="${archive}" \
            HEAD
          cosign sign-blob --yes \
            --bundle "${archive}.sigstore.json" \
            "${archive}"

      - name: Join the staging bootstrap tailnet
        uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-ci-staging-deploy
          ping: ${{ vars.STAGING_EC2_HOST }}

      - name: Configure verified SSH
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.STAGING_EC2_SSH_PRIVATE_KEY_B64 }}
          SSH_KNOWN_HOSTS: ${{ secrets.STAGING_EC2_KNOWN_HOSTS }}
        shell: bash
        run: |
          umask 077
          install -d -m 0700 ~/.ssh
          if [[ ! "${SSH_PRIVATE_KEY_B64}" =~ ^[A-Za-z0-9+/]+={0,2}$ ]]; then
            echo "::error::STAGING_EC2_SSH_PRIVATE_KEY_B64 is not valid single-line Base64."
            exit 1
          fi
          if ! printf '%s' "${SSH_PRIVATE_KEY_B64}" \
              | base64 --decode > ~/.ssh/bootstrap_key; then
            echo "::error::STAGING_EC2_SSH_PRIVATE_KEY_B64 could not be decoded."
            exit 1
          fi
          chmod 0600 ~/.ssh/bootstrap_key
          if ! ssh-keygen -y -P "" -f ~/.ssh/bootstrap_key >/dev/null 2>&1; then
            echo "::error::Decoded staging SSH key could not be parsed."
            exit 1
          fi
          printf '%s\n' "${SSH_KNOWN_HOSTS}" \
            | tr -d '\r' > ~/.ssh/known_hosts
          chmod 0600 ~/.ssh/known_hosts
          if [[ ! -s ~/.ssh/known_hosts ]]; then
            echo "::error::STAGING_EC2_KNOWN_HOSTS is empty."
            exit 1
          fi

      - name: Verify restricted staging bootstrap authorization
        shell: bash
        run: |
          if ! ssh -p "${REMOTE_PORT}" -i ~/.ssh/bootstrap_key \
              -o BatchMode=yes -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=yes -o ConnectTimeout=15 \
              "${REMOTE_USER}@${REMOTE_HOST}" \
              "test -x /usr/local/sbin/sitbank-container-bootstrap && sudo -n -l /usr/local/sbin/sitbank-container-bootstrap >/dev/null"; then
            echo "::error::The restricted EC2 bootstrap wrapper is not installed or is not authorized for passwordless execution. Complete the one-time administrator bootstrap from merged main, then rerun this workflow."
            exit 1
          fi

      - name: Upload signed bootstrap archive
        shell: bash
        run: |
          archive="bootstrap-${TARGET}-${TRUSTED_SHA}.tar.gz"
          scp -P "${REMOTE_PORT}" -i ~/.ssh/bootstrap_key \
            -o BatchMode=yes -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes -o ConnectTimeout=15 \
            "${archive}" "${archive}.sigstore.json" \
            "${REMOTE_USER}@${REMOTE_HOST}:incoming/"

      - name: Install trusted staging deployment files
        shell: bash
        run: |
          ssh -p "${REMOTE_PORT}" -i ~/.ssh/bootstrap_key \
            -o BatchMode=yes -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes -o ConnectTimeout=15 \
            "${REMOTE_USER}@${REMOTE_HOST}" \
            "sudo -n /usr/local/sbin/sitbank-container-bootstrap '${TARGET}' '${TRUSTED_SHA}'"

      - name: Verify installed staging wrapper hash
        shell: bash
        run: |
          expected_hash="$(
            sha256sum ops/deploy/sitbank-container-deploy | awk '{print $1}'
          )"
          remote_output="$(
            ssh -p "${REMOTE_PORT}" -i ~/.ssh/bootstrap_key \
              -o BatchMode=yes -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=yes -o ConnectTimeout=15 \
              "${REMOTE_USER}@${REMOTE_HOST}" \
              "sha256sum /usr/local/sbin/sitbank-container-deploy"
          )"
          remote_hash="${remote_output%% *}"
          if [[ "${remote_hash}" != "${expected_hash}" ]]; then
            echo "::error::Installed staging deployment wrapper hash does not match trusted main."
            exit 1
          fi
          echo "EC2 staging deployment wrapper is current."

      - name: Remove local bootstrap credentials and archive
        if: always()
        shell: bash
        run: |
          rm -f -- \
            ~/.ssh/bootstrap_key \
            "bootstrap-${TARGET}-${TRUSTED_SHA}.tar.gz" \
            "bootstrap-${TARGET}-${TRUSTED_SHA}.tar.gz.sigstore.json"

      - name: Disconnect staging bootstrap tailnet
        if: ${{ always() }}
        shell: bash
        run: sudo tailscale logout > /dev/null 2>&1 || true

  bootstrap-production:
    name: Bootstrap production EC2
    if: inputs.target_environment == 'production'
    needs: validate-request
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    environment:
      name: production
      url: https://${{ vars.PROD_PUBLIC_HOST }}
    env:
      TARGET: production
      TRUSTED_SHA: ${{ github.workflow_sha }}
      REMOTE_HOST: ${{ vars.PROD_EC2_HOST }}
      REMOTE_PORT: ${{ vars.PROD_EC2_PORT }}
      REMOTE_USER: ${{ vars.PROD_EC2_DEPLOY_USER }}
    steps:
      - name: Check out trusted main workflow commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.workflow_sha }}

      - name: Verify production bootstrap configuration
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.PROD_EC2_SSH_PRIVATE_KEY_B64 }}
          SSH_KNOWN_HOSTS: ${{ secrets.PROD_EC2_KNOWN_HOSTS }}
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
        shell: bash
        run: |
          required=(
            REMOTE_HOST
            REMOTE_PORT
            REMOTE_USER
            SSH_PRIVATE_KEY_B64
            SSH_KNOWN_HOSTS
            TS_OAUTH_CLIENT_ID
            TS_OAUTH_SECRET
          )
          missing=0
          for name in "${required[@]}"; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing required production bootstrap setting: ${name}"
              missing=1
            fi
          done
          if [[ ! "${REMOTE_PORT}" =~ ^[0-9]+$ ]]; then
            echo "::error::PROD_EC2_PORT must be numeric."
            missing=1
          fi
          exit "${missing}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6

      - name: Create and sign trusted main bootstrap archive
        shell: bash
        run: |
          umask 077
          archive="bootstrap-${TARGET}-${TRUSTED_SHA}.tar.gz"
          git archive \
            --format=tar.gz \
            --add-virtual-file=".sitbank-bootstrap-commit:${TRUSTED_SHA}" \
            --output="${archive}" \
            HEAD
          cosign sign-blob --yes \
            --bundle "${archive}.sigstore.json" \
            "${archive}"

      - name: Join the production bootstrap tailnet
        uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-ci-prod-deploy
          ping: ${{ vars.PROD_EC2_HOST }}

      - name: Configure verified SSH
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.PROD_EC2_SSH_PRIVATE_KEY_B64 }}
          SSH_KNOWN_HOSTS: ${{ secrets.PROD_EC2_KNOWN_HOSTS }}
        shell: bash
        run: |
          umask 077
          install -d -m 0700 ~/.ssh
          if [[ ! "${SSH_PRIVATE_KEY_B64}" =~ ^[A-Za-z0-9+/]+={0,2}$ ]]; then
            echo "::error::PROD_EC2_SSH_PRIVATE_KEY_B64 is not valid single-line Base64."
            exit 1
          fi
          if ! printf '%s' "${SSH_PRIVATE_KEY_B64}" \
              | base64 --decode > ~/.ssh/bootstrap_key; then
            echo "::error::PROD_EC2_SSH_PRIVATE_KEY_B64 could not be decoded."
            exit 1
          fi
          chmod 0600 ~/.ssh/bootstrap_key
          if ! ssh-keygen -y -P "" -f ~/.ssh/bootstrap_key >/dev/null 2>&1; then
            echo "::error::Decoded production SSH key could not be parsed."
            exit 1
          fi
          printf '%s\n' "${SSH_KNOWN_HOSTS}" \
            | tr -d '\r' > ~/.ssh/known_hosts
          chmod 0600 ~/.ssh/known_hosts
          if [[ ! -s ~/.ssh/known_hosts ]]; then
            echo "::error::PROD_EC2_KNOWN_HOSTS is empty."
            exit 1
          fi

      - name: Verify restricted production bootstrap authorization
        shell: bash
        run: |
          if ! ssh -p "${REMOTE_PORT}" -i ~/.ssh/bootstrap_key \
              -o BatchMode=yes -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=yes -o ConnectTimeout=15 \
              "${REMOTE_USER}@${REMOTE_HOST}" \
              "test -x /usr/local/sbin/sitbank-container-bootstrap && sudo -n -l /usr/local/sbin/sitbank-container-bootstrap >/dev/null"; then
            echo "::error::The restricted EC2 bootstrap wrapper is not installed or is not authorized for passwordless execution. Complete the one-time administrator bootstrap from merged main, then rerun this workflow."
            exit 1
          fi

      - name: Upload signed bootstrap archive
        shell: bash
        run: |
          archive="bootstrap-${TARGET}-${TRUSTED_SHA}.tar.gz"
          scp -P "${REMOTE_PORT}" -i ~/.ssh/bootstrap_key \
            -o BatchMode=yes -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes -o ConnectTimeout=15 \
            "${archive}" "${archive}.sigstore.json" \
            "${REMOTE_USER}@${REMOTE_HOST}:incoming/"

      - name: Install trusted production deployment files
        shell: bash
        run: |
          ssh -p "${REMOTE_PORT}" -i ~/.ssh/bootstrap_key \
            -o BatchMode=yes -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes -o ConnectTimeout=15 \
            "${REMOTE_USER}@${REMOTE_HOST}" \
            "sudo -n /usr/local/sbin/sitbank-container-bootstrap '${TARGET}' '${TRUSTED_SHA}'"

      - name: Verify installed production wrapper hash
        shell: bash
        run: |
          expected_hash="$(
            sha256sum ops/deploy/sitbank-container-deploy | awk '{print $1}'
          )"
          remote_output="$(
            ssh -p "${REMOTE_PORT}" -i ~/.ssh/bootstrap_key \
              -o BatchMode=yes -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=yes -o ConnectTimeout=15 \
              "${REMOTE_USER}@${REMOTE_HOST}" \
              "sha256sum /usr/local/sbin/sitbank-container-deploy"
          )"
          remote_hash="${remote_output%% *}"
          if [[ "${remote_hash}" != "${expected_hash}" ]]; then
            echo "::error::Installed production deployment wrapper hash does not match trusted main."
            exit 1
          fi
          echo "EC2 production deployment wrapper is current."

      - name: Remove local bootstrap credentials and archive
        if: always()
        shell: bash
        run: |
          rm -f -- \
            ~/.ssh/bootstrap_key \
            "bootstrap-${TARGET}-${TRUSTED_SHA}.tar.gz" \
            "bootstrap-${TARGET}-${TRUSTED_SHA}.tar.gz.sigstore.json"

      - name: Disconnect production bootstrap tailnet
        if: ${{ always() }}
        shell: bash
        run: sudo tailscale logout > /dev/null 2>&1 || true
