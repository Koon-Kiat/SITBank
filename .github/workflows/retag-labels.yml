name: Retag issue and pull request labels

on:
  workflow_dispatch:
    inputs:
      target:
        description: Issues, pull requests, or both.
        required: true
        type: choice
        options:
          - issues
          - prs
          - both
        default: both
      state:
        description: Item state to retag.
        required: true
        type: choice
        options:
          - open
          - closed
          - all
        default: all
      limit:
        description: Maximum issues and/or pull requests to inspect.
        required: true
        default: "500"
      dry_run:
        description: Print planned changes without editing issue or PR labels.
        required: true
        type: choice
        options:
          - "true"
          - "false"
        default: "true"
      confirm_retag:
        description: Type RETAG to allow label removal and retagging.
        required: false

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ inputs.target }}-${{ inputs.state }}
  cancel-in-progress: false

jobs:
  retag:
    name: Retag issue and pull request labels
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      TARGET: ${{ inputs.target }}
      STATE: ${{ inputs.state }}
      LIMIT: ${{ inputs.limit }}
      DRY_RUN: ${{ inputs.dry_run }}
      CONFIRM_RETAG: ${{ inputs.confirm_retag }}
      # Dependabot and GitHub Actions use these ecosystem labels. Manual retag
      # may preserve them but must never add them to every item.
      PROTECTED_LABELS: |
        dependencies
        docker
        github-actions
        python
    steps:
      - name: Check out trusted retag policy
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Validate retag request
        shell: bash
        run: |
          set -Eeuo pipefail
          if [[ ! "${LIMIT}" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::limit must be a positive integer."
            exit 1
          fi
          if [[ "${DRY_RUN}" != "true" && "${CONFIRM_RETAG}" != "RETAG" ]]; then
            echo "::error::dry_run=false requires confirm_retag to equal RETAG."
            exit 1
          fi
          if [[ "${DRY_RUN}" == "true" ]]; then
            echo "Dry-run mode is active; no issue, pull request, or repository labels will be changed."
          else
            echo "Apply mode confirmed; unprotected labels will be replaced by bounded policy labels."
          fi

      - name: Ensure standard labels exist
        if: ${{ inputs.dry_run == 'false' }}
        shell: bash
        run: |
          set -Eeuo pipefail
          definitions_file="${RUNNER_TEMP}/label-definitions.tsv"
          python ops/security/github_label_policy.py definitions > "${definitions_file}"
          while IFS=$'\t' read -r label description color; do
            gh label create "${label}" \
              --description "${description}" \
              --color "${color}" \
              --force
          done < "${definitions_file}"

      - name: Retag selected items
        shell: bash
        run: |
          set -Eeuo pipefail

          protected_labels=()
          while IFS= read -r protected_label; do
            if [[ -n "${protected_label//[[:space:]]/}" ]]; then
              protected_labels+=("${protected_label}")
            fi
          done <<< "${PROTECTED_LABELS}"

          is_protected() {
            local candidate="$1"
            local protected
            for protected in "${protected_labels[@]}"; do
              if [[ "${candidate}" == "${protected}" ]]; then
                return 0
              fi
            done
            return 1
          }

          join_labels() {
            if (( $# == 0 )); then
              printf '(none)'
            else
              local IFS=', '
              printf '%s' "$*"
            fi
          }

          add_unique() {
            local -n array_ref="$1"
            local candidate="$2"
            local existing
            for existing in "${array_ref[@]}"; do
              if [[ "${existing}" == "${candidate}" ]]; then
                return 0
              fi
            done
            array_ref+=("${candidate}")
          }

          report_and_apply() {
            local kind="$1"
            local number="$2"
            shift 2
            local -a current=()
            local -a computed=()
            local section="current"
            local value
            for value in "$@"; do
              if [[ "${value}" == "--computed--" ]]; then
                section="computed"
              elif [[ "${section}" == "current" ]]; then
                current+=("${value}")
              else
                computed+=("${value}")
              fi
            done

            local -a preserved=()
            local -a removed=()
            local -a final_labels=()
            local label
            for label in "${current[@]}"; do
              if is_protected "${label}"; then
                add_unique preserved "${label}"
                add_unique final_labels "${label}"
              else
                add_unique removed "${label}"
              fi
            done
            for label in "${computed[@]}"; do
              add_unique final_labels "${label}"
            done

            echo "::group::${kind} #${number}"
            echo "current labels: $(join_labels "${current[@]}")"
            echo "protected labels preserved: $(join_labels "${preserved[@]}")"
            echo "unprotected labels removed: $(join_labels "${removed[@]}")"
            echo "computed labels added: $(join_labels "${computed[@]}")"
            echo "final expected labels: $(join_labels "${final_labels[@]}")"
            echo "::endgroup::"

            if [[ "${DRY_RUN}" == "true" ]]; then
              return 0
            fi
            local edit_command=(gh issue edit)
            if [[ "${kind}" == "Pull request" ]]; then
              edit_command=(gh pr edit)
            fi
            for label in "${removed[@]}"; do
              "${edit_command[@]}" "${number}" --remove-label "${label}"
            done
            if (( ${#computed[@]} > 0 )); then
              local IFS=,
              "${edit_command[@]}" "${number}" --add-label "${computed[*]}"
            fi
          }

          process_issues() {
            local row issue_json number
            local rows_file="${RUNNER_TEMP}/retag-issues.jsonl"
            local current_file="${RUNNER_TEMP}/retag-issue-current.txt"
            local computed_file="${RUNNER_TEMP}/retag-issue-computed.txt"
            local -a rows=()
            local -a current=()
            local -a computed=()
            gh issue list \
              --state "${STATE}" \
              --limit "${LIMIT}" \
              --json number,title,body,labels \
              --jq '.[] | @base64' \
              > "${rows_file}"
            mapfile -t rows < "${rows_file}"
            for row in "${rows[@]}"; do
              issue_json="$(printf '%s' "${row}" | base64 --decode)"
              number="$(jq -r '.number' <<< "${issue_json}")"
              jq -r '.labels[].name' <<< "${issue_json}" > "${current_file}"
              mapfile -t current < "${current_file}"
              python ops/security/github_label_policy.py compute \
                --kind issue \
                --input - <<< "${issue_json}" \
                > "${computed_file}"
              mapfile -t computed < "${computed_file}"
              report_and_apply "Issue" "${number}" "${current[@]}" --computed-- "${computed[@]}"
            done
          }

          process_prs() {
            local row pr_json number paths_json input_json
            local rows_file="${RUNNER_TEMP}/retag-prs.jsonl"
            local current_file="${RUNNER_TEMP}/retag-pr-current.txt"
            local computed_file="${RUNNER_TEMP}/retag-pr-computed.txt"
            local -a rows=()
            local -a current=()
            local -a computed=()
            gh pr list \
              --state "${STATE}" \
              --limit "${LIMIT}" \
              --json number,title,body,headRefName,labels \
              --jq '.[] | @base64' \
              > "${rows_file}"
            mapfile -t rows < "${rows_file}"
            for row in "${rows[@]}"; do
              pr_json="$(printf '%s' "${row}" | base64 --decode)"
              number="$(jq -r '.number' <<< "${pr_json}")"
              jq -r '.labels[].name' <<< "${pr_json}" > "${current_file}"
              mapfile -t current < "${current_file}"
              if paths_json="$(
                gh pr diff "${number}" --name-only 2>/dev/null \
                  | jq -R -s 'split("\n") | map(select(length > 0))'
              )"; then
                input_json="$(
                  jq --argjson paths "${paths_json}" '. + {paths: $paths}' <<< "${pr_json}"
                )"
              else
                echo "::warning::Could not load changed paths for PR #${number}; using title, body, and branch only."
                input_json="$(jq '. + {paths: []}' <<< "${pr_json}")"
              fi
              python ops/security/github_label_policy.py compute \
                --kind pr \
                --input - <<< "${input_json}" \
                > "${computed_file}"
              mapfile -t computed < "${computed_file}"
              report_and_apply "Pull request" "${number}" "${current[@]}" --computed-- "${computed[@]}"
            done
          }

          echo "Protected labels: $(join_labels "${protected_labels[@]}")"
          case "${TARGET}" in
            issues)
              process_issues
              ;;
            prs)
              process_prs
              ;;
            both)
              process_issues
              process_prs
              ;;
            *)
              echo "::error::Unsupported target: ${TARGET}"
              exit 1
              ;;
          esac
