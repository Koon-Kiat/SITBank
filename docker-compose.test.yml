services:
  test:
    image: python:3.12-slim
    working_dir: /app
    environment:
      - PYTHONPATH=/app
    volumes:
      - .:/app
      - pip-cache:/root/.cache/pip
    command: >
      bash -c "apt-get update -qq && apt-get install -y -qq git &&
               pip install --quiet -r requirements-dev.lock &&
               pytest tests/ -x -q --tb=short"

volumes:
  pip-cache:
